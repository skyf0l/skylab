# Vault config (Terraform). Vault is tailnet-only, so both jobs join the Headscale
# tailnet as a tag:ci node before the OIDC -> Vault login.
#
# One-time setup of the HEADSCALE_CI_AUTHKEY secret (the ci@ user + tag:ci are
# declared in the headscale chart — deploy that first so the user exists):
#
#   kubectl -n headscale exec headscale-0 -- headscale users list -o json | jq -r '.[]|select(.name=="ci@skyf0l.dev").id'
#   kubectl -n headscale exec headscale-0 -- headscale preauthkeys create --reusable --ephemeral --expiration 8760h --tags tag:ci --user "$uid"
#   gh secret set HEADSCALE_CI_AUTHKEY --body '<key>'
#
# --tags stamps tag:ci on the runner node (tagOwners in headscale only authorizes
# it — it tags nothing on its own); the ACL matches src tag:ci. reusable+long-expiry
# = one durable key in CI; ephemeral = each runner node auto-removes after the run.
name: Vault
on:
  pull_request:
    branches: ["main"]
    paths:
      - "vault/**"
      - ".github/workflows/vault.yml"
  push:
    branches: ["main"]
    paths:
      - "vault/**"
      - ".github/workflows/vault.yml"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # OIDC
  pull-requests: write

# Serialize applies — the R2 backend has no state locking, so two concurrent
# runs could corrupt state.
concurrency:
  group: vault-terraform
  cancel-in-progress: false

env:
  # Vault is tailnet-only. Reached via the Headscale proxy at this MagicDNS name,
  # which Traefik serves with the *.tail Let's Encrypt wildcard cert — so system
  # trust validates it and no custom CA is needed (the old VAULT_CA_CERT secret is
  # gone). Resolving the name requires being on the tailnet (--accept-dns below).
  VAULT_ADDR: https://vault.tail.skyf0l.dev
  HEADSCALE_URL: https://headscale.skyf0l.dev
  TF_IN_AUTOMATION: "1"
  TF_INPUT: "false"
  WORKING_DIRECTORY: vault/terraform

jobs:
  # PR plan — joins the tailnet, authenticates with the read-only `tf-plan` role.
  plan:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIRECTORY }}
    steps:
      - uses: actions/checkout@v6
      - uses: hashicorp/setup-terraform@v3

      # Vault (and the R2-state creds it holds) are only reachable on the tailnet.
      # Join as an ephemeral, tag:ci Headscale node — auto-removed when the run
      # ends; the Headscale ACL limits tag:ci to the Vault proxy only. The key
      # itself carries the tag + ephemeral flag (minted like headscale-proxy's).
      - name: Join tailnet (Headscale)
        uses: tailscale/github-action@v3
        with:
          authkey: ${{ secrets.HEADSCALE_CI_AUTHKEY }}
          args: --login-server=${{ env.HEADSCALE_URL }} --accept-dns --hostname=gha-vault-ci

      # MagicDNS isn't reliably applied on hosted runners, so vault.tail.<domain>
      # can fall through to the public wildcard (-> public Traefik -> tailnet-only
      # 403). Pin it to the node's tailnet IP from tailscaled so we never depend on
      # runner DNS. The getent lines are diagnostics: pre-pin shows what DNS gave.
      - name: Resolve Vault over the tailnet (skip public wildcard)
        run: |
          tailscale status
          getent hosts vault.tail.skyf0l.dev || true
          echo "$(tailscale ip -4 vault) vault.tail.skyf0l.dev" | sudo tee -a /etc/hosts
          getent hosts vault.tail.skyf0l.dev

      - name: Import Secrets
        uses: hashicorp/vault-action@v4
        with:
          url: ${{ env.VAULT_ADDR }}
          exportToken: true # Required by terraform
          method: jwt
          role: tf-plan
          secrets: |
            kvv2/data/cicd/cloudflare-tfstates AWS_ACCESS_KEY_ID ;
            kvv2/data/cicd/cloudflare-tfstates AWS_SECRET_ACCESS_KEY ;

      - run: terraform init -input=false
      - run: terraform validate
      - name: Plan
        run: terraform plan -out .planfile

      - name: Comment plan
        uses: borchero/terraform-plan-comment@v2
        with:
          token: ${{ github.token }}
          header: Vault Plan
          planfile: .planfile
          working-directory: ${{ env.WORKING_DIRECTORY }}

      - name: Revoke token
        if: always()
        run: |
          curl -X POST -sv -H "X-Vault-Token: ${{ env.VAULT_TOKEN }}" ${{ env.VAULT_ADDR }}/v1/auth/token/revoke-self

  # Apply — only from the protected `production` Environment, on main: either a
  # push (vault/** or this workflow) or a manual workflow_dispatch. The admin Vault
  # role is bound to the `environment=production` OIDC claim, so only this job can
  # mint an admin token.
  apply:
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIRECTORY }}
    steps:
      - uses: actions/checkout@v6
      - uses: hashicorp/setup-terraform@v3

      - name: Join tailnet (Headscale)
        uses: tailscale/github-action@v3
        with:
          authkey: ${{ secrets.HEADSCALE_CI_AUTHKEY }}
          args: --login-server=${{ env.HEADSCALE_URL }} --accept-dns --hostname=gha-vault-ci

      # MagicDNS isn't reliably applied on hosted runners, so vault.tail.<domain>
      # can fall through to the public wildcard (-> public Traefik -> tailnet-only
      # 403). Pin it to the node's tailnet IP from tailscaled so we never depend on
      # runner DNS. The getent lines are diagnostics: pre-pin shows what DNS gave.
      - name: Resolve Vault over the tailnet (skip public wildcard)
        run: |
          tailscale status
          getent hosts vault.tail.skyf0l.dev || true
          echo "$(tailscale ip -4 vault) vault.tail.skyf0l.dev" | sudo tee -a /etc/hosts
          getent hosts vault.tail.skyf0l.dev

      - name: Import Secrets
        uses: hashicorp/vault-action@v4
        with:
          url: ${{ env.VAULT_ADDR }}
          exportToken: true # Required by terraform
          method: jwt
          role: admin
          secrets: |
            kvv2/data/cicd/cloudflare-tfstates AWS_ACCESS_KEY_ID ;
            kvv2/data/cicd/cloudflare-tfstates AWS_SECRET_ACCESS_KEY ;

      - run: terraform init -input=false
      - run: terraform validate
      - name: Apply
        run: terraform apply
        env:
          TF_CLI_ARGS_apply: "-auto-approve"

      - name: Revoke token
        if: always()
        run: |
          curl -X POST -sv -H "X-Vault-Token: ${{ env.VAULT_TOKEN }}" ${{ env.VAULT_ADDR }}/v1/auth/token/revoke-self
