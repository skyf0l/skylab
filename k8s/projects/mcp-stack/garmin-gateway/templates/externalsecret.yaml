{{- if .Values.externalSecret.enabled }}
# Projects the combined garth token (Vault field tokenProperty) to the secret key
# GARMINTOKENS, which the upstream garmin_mcp chart consumes via garmin.existingSecret
# (envFrom -> $GARMINTOKENS). One field, not the two oauth files.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ .Values.externalSecret.secretName }}
  labels:
    app: garmin-gateway
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: {{ .Values.externalSecret.storeName }}
    kind: ClusterSecretStore
  target:
    name: {{ .Values.externalSecret.secretName }}
    creationPolicy: Owner
  data:
    - secretKey: GARMINTOKENS
      remoteRef:
        key: {{ .Values.externalSecret.vaultKey | quote }}
        property: {{ .Values.externalSecret.tokenProperty }}
{{- end }}
