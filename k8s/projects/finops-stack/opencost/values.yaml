# OpenCost — FinOps cost allocation. Exposes per-namespace/pod/label cost metrics to
# the existing Prometheus and ships its own UI. No cloud billing API here (flat-rate
# VPS), so pricing is a custom on-prem model (below). Values nest under the `opencost`
# subchart, whose own config block is also `opencost` -> hence opencost.opencost.*.
opencost:
  # NB: do NOT set clusterName to "skylab" — this chart uses clusterName as the DNS
  # cluster domain when building the in-cluster Prometheus FQDN, so it must stay
  # cluster.local (default) or the Prometheus URL resolves to ...svc.skylab and fails.
  opencost:
    # ---- where OpenCost reads metrics from (the existing kube-prometheus) ----------
    prometheus:
      internal:
        enabled: true
        serviceName: kube-prometheus-kube-prome-prometheus
        namespaceName: monitoring
        port: 9090
        scheme: http

    # ---- custom pricing model ------------------------------------------------------
    # The VPS is a FLAT $28.80/month (Xeon E3-1270v6 4c/8t -> 8 vCPU, 64GB ECC,
    # 2x450GB NVMe). OpenCost prices each resource PER UNIT and allocates by
    # request/usage; it does NOT inflate running pods to fill the bill. Whatever is
    # not used shows as "idle cost" — i.e. the slice of $28.80 being wasted.
    #
    # Rates are set so a FULLY-used node = $28.80/mo, split across CPU+RAM by a
    # realistic ratio (~AWS CPU:RAM weighting) over 8 cores / 62.5 GiB / 730h:
    #   CPU: 0.002406 /core/h  -> 0.002406 * 8    * 730 ~= $14.05/mo
    #   RAM: 0.000323 /GB/h    -> 0.000323 * 62.5  * 730 ~= $14.74/mo   (total ~$28.8)
    # storage is a small NVMe rate so PV-backed apps show a storage line (the disk is
    # already inside the flat fee, so treat this as supplementary, adjustable).
    # Network egress = 0 (VPS bandwidth is included). Tune any of these freely.
    customPricing:
      enabled: true
      provider: custom
      createConfigmap: true
      costModel:
        description: "skylab VPS flat $28.80/mo over 8 vCPU / 62.5 GiB"
        CPU: 0.002406
        spotCPU: 0.002406
        RAM: 0.000323
        spotRAM: 0.000323
        GPU: 0
        storage: 0.0000548
        zoneNetworkEgress: 0
        regionNetworkEgress: 0
        internetNetworkEgress: 0

    # ---- metrics + UI --------------------------------------------------------------
    # kube-prometheus scrapes every ServiceMonitor (selectorNilUsesHelmValues=false).
    metrics:
      serviceMonitor:
        enabled: true
    ui:
      enabled: true
