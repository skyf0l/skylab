{{- if .Values.externalSecret.enabled }}
# Projects the dedicated R2 token (Object R/W on the skylab-loki bucket) from Vault
# into the loki-r2 Secret, with env-var-named keys the Loki pod consumes via
# extraEnvFrom + -config.expand-env=true.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: loki-r2
  labels:
    app: loki
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: {{ .Values.externalSecret.storeName }}
    kind: ClusterSecretStore
  target:
    name: loki-r2
    creationPolicy: Owner
  data:
    - secretKey: R2_ACCESS_KEY_ID
      remoteRef:
        key: {{ .Values.externalSecret.vaultKey | quote }}
        property: r2_access_key_id
    - secretKey: R2_SECRET_ACCESS_KEY
      remoteRef:
        key: {{ .Values.externalSecret.vaultKey | quote }}
        property: r2_secret_access_key
{{- end }}
