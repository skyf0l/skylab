# Let's Encrypt ClusterIssuers using DNS-01 via Cloudflare. HTTP-01 does NOT work
# here: the Cloudflare proxy + Traefik's HTTP->HTTPS redirect break the
# /.well-known/acme-challenge self-check. DNS-01 sidesteps both.
issuers:
  letsencrypt-staging: https://acme-staging-v02.api.letsencrypt.org/directory
  letsencrypt-prod: https://acme-v02.api.letsencrypt.org/directory

# ACME registration email — set per cluster in values/<cluster>.yaml
email: ""

# Cloudflare API token Secret, read from the cert-manager namespace.
# Now minted by Vault's cloudflare secrets engine (role dns-edit: Zone Read +
# DNS Write across the whole account) and leased by ESO — see
# templates/externalsecret.yaml. The old hand-created `cloudflare-api-token`
# secret was scoped to a single zone, which broke DNS-01 for every domain added
# afterwards; delete it once this is verified.
cloudflare:
  fromVault: true
  tokenSecretName: cloudflare-cf-token
  tokenSecretKey: api-token
  serviceAccount: cert-manager-cf # SA the generator authenticates as (this ns)
  vaultServer: "http://vault.vault.svc:8200"
  vaultAuthMount: kubernetes
  vaultRole: cert-manager-cf # Vault k8s auth role bound to the SA above
  credsPath: "cloudflare/creds/dns-edit"
  refreshInterval: 8h
