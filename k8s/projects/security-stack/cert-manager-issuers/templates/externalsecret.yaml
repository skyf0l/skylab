{{- if .Values.cloudflare.fromVault }}
# Cloudflare token for the ACME DNS-01 solver, leased from Vault's cloudflare
# secrets engine (role dns-edit) via the ESO VaultDynamicSecret generator —
# same model as external-dns, no hand-created credential.
#
# Why this matters beyond tidiness: a manually scoped token silently fails for
# any zone it wasn't granted, and the failure surfaces only as a Challenge stuck
# "pending" with "Found no Zones for domain ...". The engine role covers every
# zone in the account, so adding a domain needs no token surgery.
#
# cert-manager reads the token per API call, so rotation needs no restart.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.cloudflare.serviceAccount }}
  labels:
    app.kubernetes.io/part-of: cert-manager-issuers
---
apiVersion: generators.external-secrets.io/v1alpha1
kind: VaultDynamicSecret
metadata:
  name: cert-manager-cloudflare
  labels:
    app.kubernetes.io/part-of: cert-manager-issuers
spec:
  path: {{ .Values.cloudflare.credsPath | quote }}
  method: GET
  provider:
    server: {{ .Values.cloudflare.vaultServer | quote }}
    auth:
      kubernetes:
        mountPath: {{ .Values.cloudflare.vaultAuthMount | quote }}
        role: {{ .Values.cloudflare.vaultRole | quote }}
        serviceAccountRef:
          name: {{ .Values.cloudflare.serviceAccount }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cert-manager-cloudflare
  labels:
    app.kubernetes.io/part-of: cert-manager-issuers
spec:
  refreshInterval: {{ .Values.cloudflare.refreshInterval }}
  target:
    # Deliberately NOT the legacy manual secret's name: the issuers point here
    # only once this is populated, so a failure can't strand cert-manager
    # without a token. Delete the old secret after verifying.
    name: {{ .Values.cloudflare.tokenSecretName }}
    creationPolicy: Owner
    template:
      data:
        {{ .Values.cloudflare.tokenSecretKey }}: "{{ `{{ .token }}` }}"
  dataFrom:
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: VaultDynamicSecret
          name: cert-manager-cloudflare
{{- end }}
