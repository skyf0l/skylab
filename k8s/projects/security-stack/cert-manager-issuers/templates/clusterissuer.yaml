{{- range $name, $server := .Values.issuers }}
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: {{ $name }}
spec:
  acme:
    server: {{ $server }}
    email: {{ required "cert-manager-issuers: .Values.email is required (set it in values/<cluster>.yaml)" $.Values.email }}
    privateKeySecretRef:
      name: {{ $name }}-account-key
    solvers:
      # DNS-01 via Cloudflare — works behind the Cloudflare proxy and ignores
      # Traefik's HTTP->HTTPS redirect (both of which break HTTP-01).
      - dns01:
          cloudflare:
            apiTokenSecretRef:
              name: {{ $.Values.cloudflare.tokenSecretName }}
              key: {{ $.Values.cloudflare.tokenSecretKey }}
---
{{- end }}
