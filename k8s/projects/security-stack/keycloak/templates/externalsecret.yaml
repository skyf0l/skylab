# Bootstrap-admin password from Vault (kvv2/cluster/skylab/apps/keycloak -> admin_password).
# Seed it with vault/seed-secrets.sh (random, set-once). The DB credential is NOT here —
# CNPG owns it via the keycloak-pg-app secret.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: keycloak
  labels:
    app.kubernetes.io/part-of: keycloak
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: {{ .Values.externalSecret.storeName }}
    kind: ClusterSecretStore
  target:
    name: keycloak
    creationPolicy: Owner
  data:
    - secretKey: admin-password
      remoteRef:
        key: {{ .Values.externalSecret.vaultKey | quote }}
        property: admin_password
{{- if .Values.backup.enabled }}
---
# R2 token for Barman backups (gated). Seed r2_* in the same Vault path.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: keycloak-pg-backup
  labels:
    app.kubernetes.io/part-of: keycloak
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: {{ .Values.externalSecret.storeName }}
    kind: ClusterSecretStore
  target:
    name: keycloak-pg-backup
    creationPolicy: Owner
  data:
    - secretKey: ACCESS_KEY_ID
      remoteRef:
        key: {{ .Values.externalSecret.vaultKey | quote }}
        property: r2_access_key_id
    - secretKey: ACCESS_SECRET_KEY
      remoteRef:
        key: {{ .Values.externalSecret.vaultKey | quote }}
        property: r2_secret_access_key
{{- end }}
