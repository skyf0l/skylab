image:
  # tailnet node (kernel mode — needs NET_ADMIN + /dev/net/tun).
  tailscale: tailscale/tailscale:v1.78.1
  # socket proxy: listens on the pod's tailnet interface and dials Traefik from
  # its own socket (so the ClusterIP is translated under Cilium KPR).
  socat: alpine/socat:1.8.0.0

# In-cluster Headscale control server (internal Service — no public round-trip).
loginServer: http://headscale.headscale.svc.cluster.local

# Traefik endpoint every proxy forwards to. Traefik terminates TLS with the
# *.tail.skyf0l.dev wildcard cert and routes by Host via the tail-ingress
# IngressRoutes. The proxy is a pure L4 passthrough to :443.
traefikService: traefik.traefik.svc.cluster.local
traefikPort: 443

# Shared reusable pre-auth key (tagged tag:tail-proxy), auto-minted by the
# PreSync Job below and consumed by every proxy pod.
authKeySecret: tail-proxy-authkey
tag: "tag:tail-proxy"

# Auto-mint the shared key — execs Headscale, mints a REUSABLE key for `user`
# WITH --tags (authkey nodes can't self-request tags), writes authKeySecret.
# Idempotent: skips if the secret is already populated. PreSync so the secret
# exists before the proxy Deployments roll.
authkeyMint:
  enabled: true
  user: infra@skyf0l.dev
  headscaleNamespace: headscale
  headscalePod: headscale-0
  jobImage: alpine/kubectl:1.36.1
  expiration: 999d

# ---- TLS + routing (folded in from the old tail-ingress chart) ----
# Traefik terminates TLS with a wildcard cert and routes by Host; the proxies
# forward to it. Rendered in THIS namespace so the IngressRoutes reference the
# cert secret + middleware locally (service refs are cross-ns → needs traefik
# allowCrossNamespace=true).
baseDomain: tail.skyf0l.dev
clusterIssuer: letsencrypt-prod
tlsSecretName: tail-wildcard-tls
middlewareName: tailnet-only
# Only the proxy pods reach Traefik for these hosts (socat connects from the
# proxy pod IP). Anything else -> 403. This is what makes them tailnet-only.
allowedSourceRanges:
  - 10.42.0.0/16    # pod CIDR (proxy-pod source)

# One entry per admin UI. Each renders BOTH a tailnet proxy node
# (<name>.tail.skyf0l.dev) AND a Traefik IngressRoute Host(<name>.tail...) ->
# service.namespace:port. Add a UI = add one entry.
services:
  - name: argocd
    service: argocd-server
    namespace: argocd
    port: 80
  - name: vault
    service: vault
    namespace: vault
    port: 8200
    scheme: http   # vault listener is http internally; set https if you enable TLS on it
  - name: grafana
    service: kube-prometheus-grafana
    namespace: monitoring
    port: 80
  - name: hubble
    service: hubble-ui
    namespace: kube-system
    port: 80
