{{- range .Values.services }}
# Traefik routes Host(<name>.tail.<domain>) -> the backend Service (cross-ns),
# terminating TLS with the wildcard cert and enforcing the tailnet-only middleware.
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: tail-{{ .name }}
  labels:
    app: headscale-proxy
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`{{ .name }}.{{ $.Values.baseDomain }}`)
      middlewares:
        - name: {{ $.Values.middlewareName }}
      services:
        {{- if .traefikService }}
        # Traefik-internal service (e.g. api@internal for the dashboard) — not a
        # k8s Service, so reference it by name + kind instead of namespace/port.
        - name: {{ .traefikService }}
          kind: TraefikService
        {{- else }}
        - name: {{ .service }}
          namespace: {{ .namespace }}
          port: {{ .port }}
          {{- with .scheme }}
          scheme: {{ . }}
          {{- end }}
        {{- end }}
  tls:
    secretName: {{ $.Values.tlsSecretName }}
---
{{- end }}
