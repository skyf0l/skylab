# Shared SA for all proxy pods: tailscaled persists each node's identity in its
# own TS_KUBE_SECRET (tail-proxy-<name>-state), so it needs secrets RW.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: headscale-proxy
  labels:
    app: headscale-proxy
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: headscale-proxy
  labels:
    app: headscale-proxy
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "update", "patch", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: headscale-proxy
  labels:
    app: headscale-proxy
subjects:
  - kind: ServiceAccount
    name: headscale-proxy
roleRef:
  kind: Role
  name: headscale-proxy
  apiGroup: rbac.authorization.k8s.io
