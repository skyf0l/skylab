apiVersion: v2
name: defectdojo
type: application
version: 0.1.0

# DefectDojo vulnerability-management platform. The parent templates provision the
# database layer (CloudNativePG Cluster + Vault dynamic-cred plumbing); the
# upstream chart below runs the app (django/celery/nginx + Valkey broker), wired to
# the CNPG database via the Vault-issued DD_DATABASE_URL. Postgres subchart is
# disabled (we use CNPG); Valkey is the official image (not Bitnami).
dependencies:
  - name: defectdojo
    repository: https://raw.githubusercontent.com/DefectDojo/django-DefectDojo/helm-charts
    version: 1.9.36
