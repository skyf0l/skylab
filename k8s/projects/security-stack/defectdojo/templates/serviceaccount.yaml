# ServiceAccount the DefectDojo app pods (django/celery/initializer) run as. The
# upstream chart also creates this, but as a `pre-install` Helm hook that ArgoCD
# treats as transient and leaves missing in steady state — breaking pod creation
# ("serviceaccount defectdojo not found"), which in turn strands cred-rotation
# rollouts. We manage it as a normal resource and set defectdojo.serviceAccount.
# create=false so the chart only references it.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: defectdojo
  labels:
    app.kubernetes.io/part-of: defectdojo
{{- if .Values.dynamicCreds.enabled }}
---
# ServiceAccount the VaultDynamicSecret generator authenticates as. Bound in Vault
# to the defectdojo-db role (read on database/creds/defectdojo) — a namespaced
# generator can only use a SA in its own namespace, so the creds plumbing needs
# this rather than the central external-secrets SA.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.dynamicCreds.serviceAccount }}
  labels:
    app.kubernetes.io/part-of: defectdojo
{{- end }}
