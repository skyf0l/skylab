{{- if .Values.backup.enabled }}
# R2 credentials for Barman WAL archiving / backups.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: defectdojo-pg-backup
  labels:
    app.kubernetes.io/part-of: defectdojo
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: {{ .Values.externalSecret.storeName }}
    kind: ClusterSecretStore
  target:
    name: defectdojo-pg-backup
    creationPolicy: Owner
  data:
    - secretKey: ACCESS_KEY_ID
      remoteRef:
        key: {{ .Values.externalSecret.vaultKey | quote }}
        property: r2_access_key_id
    - secretKey: ACCESS_SECRET_KEY
      remoteRef:
        key: {{ .Values.externalSecret.vaultKey | quote }}
        property: r2_secret_access_key
{{- end }}
{{- if .Values.dynamicCreds.enabled }}
{{- if .Values.backup.enabled }}
---
{{- end }}
# Leased PostgreSQL login from Vault's database engine, read through the
# vault-database ClusterSecretStore (creds/<role> -> username+password) and
# projected as DD_DATABASE_URL. A ClusterSecretStore can use the external-secrets
# SA across namespaces; an ESO generator can't. Each refresh leases a fresh role;
# the consuming Deployment needs a Reloader annotation to restart onto it.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: defectdojo-db
  labels:
    app.kubernetes.io/part-of: defectdojo
spec:
  # Refresh well inside the role's TTL so creds never expire before renewal.
  refreshInterval: 12h
  secretStoreRef:
    name: {{ .Values.dynamicCreds.storeName }}
    kind: ClusterSecretStore
  target:
    name: defectdojo-db
    creationPolicy: Owner
    template:
      data:
        DD_DATABASE_URL: {{ `"postgresql://{{ .username }}:{{ .password }}@defectdojo-pg-rw.defectdojo.svc.cluster.local:5432/defectdojo"` }}
  dataFrom:
    - extract:
        key: "creds/{{ .Values.dynamicCreds.vaultRole }}"
{{- end }}
