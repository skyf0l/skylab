{{- if .Values.backup.enabled }}
# R2 credentials for Barman WAL archiving / backups.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: defectdojo-pg-backup
  labels:
    app.kubernetes.io/part-of: defectdojo
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: {{ .Values.externalSecret.storeName }}
    kind: ClusterSecretStore
  target:
    name: defectdojo-pg-backup
    creationPolicy: Owner
  data:
    - secretKey: ACCESS_KEY_ID
      remoteRef:
        key: {{ .Values.externalSecret.vaultKey | quote }}
        property: r2_access_key_id
    - secretKey: ACCESS_SECRET_KEY
      remoteRef:
        key: {{ .Values.externalSecret.vaultKey | quote }}
        property: r2_secret_access_key
{{- end }}
{{- if .Values.dynamicCreds.enabled }}
{{- if .Values.backup.enabled }}
---
{{- end }}
# Issues a fresh leased PostgreSQL login from the database engine on each refresh
# and projects it as a DD_DATABASE_URL env var. ClusterGenerator (not the
# namespaced VaultDynamicSecret) because only a cluster-scoped resource may use
# the external-secrets ServiceAccount across namespaces. The consuming Deployment
# needs a Reloader annotation to restart onto rotated credentials.
apiVersion: generators.external-secrets.io/v1alpha1
kind: ClusterGenerator
metadata:
  name: defectdojo-db
  labels:
    app.kubernetes.io/part-of: defectdojo
spec:
  kind: VaultDynamicSecret
  generator:
    vaultDynamicSecretSpec:
      path: "{{ .Values.dynamicCreds.vaultMount }}/creds/{{ .Values.dynamicCreds.vaultRole }}"
      method: GET
      provider:
        server: {{ .Values.externalSecret.vaultServer | quote }}
        auth:
          kubernetes:
            mountPath: {{ .Values.externalSecret.vaultAuthMount | quote }}
            role: {{ .Values.externalSecret.vaultRole | quote }}
            serviceAccountRef:
              name: external-secrets
              namespace: external-secrets
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: defectdojo-db
  labels:
    app.kubernetes.io/part-of: defectdojo
spec:
  # Refresh well inside the role's TTL so creds never expire before renewal.
  refreshInterval: 12h
  target:
    name: defectdojo-db
    creationPolicy: Owner
    template:
      data:
        DD_DATABASE_URL: {{ `"postgresql://{{ .username }}:{{ .password }}@defectdojo-pg-rw.defectdojo.svc.cluster.local:5432/defectdojo"` }}
  dataFrom:
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: ClusterGenerator
          name: defectdojo-db
{{- end }}
