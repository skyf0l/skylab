{{- if .Values.backup.enabled }}
# R2 credentials for Barman WAL archiving / backups.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: defectdojo-pg-backup
  labels:
    app.kubernetes.io/part-of: defectdojo
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: {{ .Values.externalSecret.storeName }}
    kind: ClusterSecretStore
  target:
    name: defectdojo-pg-backup
    creationPolicy: Owner
  data:
    - secretKey: ACCESS_KEY_ID
      remoteRef:
        key: {{ .Values.externalSecret.vaultKey | quote }}
        property: r2_access_key_id
    - secretKey: ACCESS_SECRET_KEY
      remoteRef:
        key: {{ .Values.externalSecret.vaultKey | quote }}
        property: r2_secret_access_key
{{- end }}
{{- if .Values.dynamicCreds.enabled }}
{{- if .Values.backup.enabled }}
---
{{- end }}
# Leased PostgreSQL login from Vault's database engine via the ESO
# VaultDynamicSecret generator. The generator reads database/creds/<role> ONCE per
# refresh and caches the lease, so username+password are always a consistent pair
# (dataFrom.extract re-leases on every read and leaves them out of sync). It
# authenticates as the dedicated SA in THIS namespace (a namespaced generator
# can't use the external-secrets SA cross-namespace). The consuming Deployment
# needs a Reloader annotation to restart onto rotated creds.
apiVersion: generators.external-secrets.io/v1alpha1
kind: VaultDynamicSecret
metadata:
  name: defectdojo-db
  labels:
    app.kubernetes.io/part-of: defectdojo
spec:
  path: {{ .Values.dynamicCreds.credsPath | quote }}
  method: GET
  provider:
    server: {{ .Values.dynamicCreds.vaultServer | quote }}
    auth:
      kubernetes:
        mountPath: {{ .Values.dynamicCreds.vaultAuthMount | quote }}
        role: {{ .Values.dynamicCreds.vaultRole | quote }}
        serviceAccountRef:
          name: {{ .Values.dynamicCreds.serviceAccount | quote }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: defectdojo-db
  labels:
    app.kubernetes.io/part-of: defectdojo
spec:
  # Refresh well inside the role's TTL so creds never expire before renewal.
  refreshInterval: 12h
  target:
    name: defectdojo-db
    creationPolicy: Owner
    template:
      data:
        DD_DATABASE_URL: {{ `"postgresql://{{ .username }}:{{ .password }}@defectdojo-pg-rw.defectdojo.svc.cluster.local:5432/defectdojo"` }}
  dataFrom:
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: VaultDynamicSecret
          name: defectdojo-db
{{- end }}
