# Stable app secrets from Vault, replacing the chart's createSecret/createValkeySecret/
# createPostgresqlSecret. Those default to randAlphaNum, which ArgoCD can't preserve
# (no helm lookup under client-side render) so they regenerate every sync -> the
# secret churns, Reloader restarts django/celery constantly, and DD_ADMIN_PASSWORD
# drifts from what the initializer wrote to the DB. Seed these once in Vault
# (random, set-once) and they stay put.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: defectdojo
  labels:
    app.kubernetes.io/part-of: defectdojo
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: {{ .Values.externalSecret.storeName }}
    kind: ClusterSecretStore
  target:
    name: defectdojo
    creationPolicy: Owner
  data:
    - secretKey: DD_SECRET_KEY
      remoteRef:
        key: {{ .Values.externalSecret.vaultKey | quote }}
        property: dd_secret_key
    - secretKey: DD_CREDENTIAL_AES_256_KEY
      remoteRef:
        key: {{ .Values.externalSecret.vaultKey | quote }}
        property: dd_aes_key
    - secretKey: DD_ADMIN_PASSWORD
      remoteRef:
        key: {{ .Values.externalSecret.vaultKey | quote }}
        property: dd_admin_password
    - secretKey: METRICS_HTTP_AUTH_PASSWORD
      remoteRef:
        key: {{ .Values.externalSecret.vaultKey | quote }}
        property: dd_metrics_password
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: defectdojo-valkey-specific
  labels:
    app.kubernetes.io/part-of: defectdojo
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: {{ .Values.externalSecret.storeName }}
    kind: ClusterSecretStore
  target:
    name: defectdojo-valkey-specific
    creationPolicy: Owner
  data:
    - secretKey: valkey-password
      remoteRef:
        key: {{ .Values.externalSecret.vaultKey | quote }}
        property: valkey_password
---
# DD_DATABASE_PASSWORD is overridden by DD_DATABASE_URL (the leased creds), so this
# value is unused — it just has to EXIST and be stable so the env ref resolves and
# the secret doesn't churn. Both keys get the same value, matching the chart.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: defectdojo-postgresql-specific
  labels:
    app.kubernetes.io/part-of: defectdojo
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: {{ .Values.externalSecret.storeName }}
    kind: ClusterSecretStore
  target:
    name: defectdojo-postgresql-specific
    creationPolicy: Owner
  data:
    - secretKey: postgresql-postgres-password
      remoteRef:
        key: {{ .Values.externalSecret.vaultKey | quote }}
        property: pg_password
    - secretKey: postgresql-password
      remoteRef:
        key: {{ .Values.externalSecret.vaultKey | quote }}
        property: pg_password
