# defectdojo-pg — CloudNativePG-managed Postgres for DefectDojo.
#
# Credential model: the database + objects are owned by a NOLOGIN parent role
# (ownerRole). Application logins are issued on demand by Vault's database engine
# as members of that parent — there is no standing application password. Vault
# connects as adminRole (CREATEROLE, not superuser) to mint/revoke those logins,
# and owns adminRole's password itself (rotated via rotate-root at setup).

postgres:
  instances: 1 # single node for now; bump once a second node joins (HA-ready)
  database: defectdojo
  # imageName: "" # optional pin; CNPG default is recent PostgreSQL (16+ required)
  ownerRole: defectdojo_app # NOLOGIN owner of the database + objects
  adminRole: vault_mgr # CREATEROLE login Vault's database engine connects as
  # Throwaway password adminRole is bootstrapped with; Vault rotate-root replaces
  # it on the first apply (see vault/terraform/database.tf), after which it lives
  # only inside Vault. MUST match local.vault_mgr_bootstrap_password there.
  vaultMgrBootstrapPassword: bootstrap-rotated-by-vault
  storage:
    size: 5Gi
    storageClass: local-path
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 1Gi

# Barman continuous WAL archiving + scheduled base backups to Cloudflare R2.
# DISABLED by default so the Cluster comes up clean: a Cluster pointed at a
# non-existent bucket fails WAL archiving, which eventually wedges the primary.
# Flip backup.enabled: true in values/<cluster>.yaml AFTER the bucket + creds exist.
backup:
  enabled: false
  retentionPolicy: "30d"
  scheduleCron: "0 0 3 * * *" # CNPG 6-field cron (sec min hour ...) — 03:00 daily
  destinationPath: "" # s3://<bucket>/<path>, per-cluster (values/<cluster>.yaml)
  endpointURL: "" # https://<account>.r2.cloudflarestorage.com, per-cluster

# Application credentials issued by Vault's database engine (database/creds/<role>)
# and projected into the defectdojo-db Secret (DD_DATABASE_URL) by the ESO
# generator, consumed by the app below. Reloader restarts the app onto rotated
# creds (see defectdojo.* annotations).
dynamicCreds:
  enabled: true
  vaultMount: database
  vaultRole: defectdojo # database/creds/defectdojo

externalSecret:
  storeName: vault-backend
  vaultKey: cluster/skylab/apps/defectdojo
  # Vault server + k8s auth for the dynamic-secret generator (mirrors the
  # vault-backend ClusterSecretStore).
  vaultServer: "http://vault.vault.svc:8200"
  vaultAuthMount: kubernetes
  vaultRole: external-secrets

# --- DefectDojo app (upstream chart) ----------------------------------------
defectdojo:
  host: defectdojo.tail.skyf0l.dev
  siteUrl: "https://defectdojo.tail.skyf0l.dev"

  # Chart generates its own django SECRET_KEY / AES key / admin password (random,
  # read back from the defectdojo secret). DB is external (CNPG) so no postgres
  # secret; Valkey gets its own generated secret.
  createSecret: true
  createValkeySecret: true
  createPostgresqlSecret: false

  # External Postgres: disable the bundled subchart; the app reaches CNPG through
  # the Vault-issued DD_DATABASE_URL (injected per-component below).
  postgresql:
    enabled: false

  # Broker: official Valkey image (not Bitnami).
  valkey:
    enabled: true

  # Reachable only on the tailnet via the headscale-proxy IngressRoute, so the
  # chart's own ingress is off.
  django:
    ingress:
      enabled: false
    extraEnv: &ddDatabaseUrl
      - name: DD_DATABASE_URL
        valueFrom:
          secretKeyRef:
            name: defectdojo-db
            key: DD_DATABASE_URL

  # Every component that touches the DB gets the same dynamic DD_DATABASE_URL.
  initializer:
    staticName: true # stable Job name — friendlier to ArgoCD
    extraEnv: *ddDatabaseUrl
  dbMigrationChecker:
    extraEnv: *ddDatabaseUrl
  celery:
    # Deployment-level annotation (worker + beat) → Reloader restarts them when
    # the leased creds rotate.
    annotations:
      reloader.stakater.com/auto: "true"
    worker:
      extraEnv: *ddDatabaseUrl
    beat:
      extraEnv: *ddDatabaseUrl
