# defectdojo-pg — CloudNativePG-managed Postgres for DefectDojo.
#
# Credential model: the database + objects are owned by a NOLOGIN parent role
# (ownerRole). Application logins are issued on demand by Vault's database engine
# as members of that parent — there is no standing application password. Vault
# connects as adminRole (CREATEROLE, not superuser) to mint/revoke those logins,
# and owns adminRole's password itself (rotated via rotate-root at setup).

postgres:
  instances: 1 # single node for now; bump once a second node joins (HA-ready)
  database: defectdojo
  # imageName: "" # optional pin; CNPG default is recent PostgreSQL (16+ required)
  ownerRole: defectdojo_app # NOLOGIN owner of the database + objects
  adminRole: vault_mgr # CREATEROLE login Vault's database engine connects as
  # Throwaway password adminRole is bootstrapped with; Vault rotate-root replaces
  # it on the first apply (see vault/terraform/database.tf), after which it lives
  # only inside Vault. MUST match local.vault_mgr_bootstrap_password there.
  vaultMgrBootstrapPassword: bootstrap-rotated-by-vault
  storage:
    size: 5Gi
    storageClass: local-path
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 1Gi

# Barman continuous WAL archiving + scheduled base backups to Cloudflare R2.
# DISABLED by default so the Cluster comes up clean: a Cluster pointed at a
# non-existent bucket fails WAL archiving, which eventually wedges the primary.
# Flip backup.enabled: true in values/<cluster>.yaml AFTER the bucket + creds exist.
backup:
  enabled: false
  retentionPolicy: "30d"
  scheduleCron: "0 0 3 * * *" # CNPG 6-field cron (sec min hour ...) — 03:00 daily
  destinationPath: "" # s3://<bucket>/<path>, per-cluster (values/<cluster>.yaml)
  endpointURL: "" # https://<account>.r2.cloudflarestorage.com, per-cluster

# Application credentials issued by Vault's database engine, leased by the ESO
# VaultDynamicSecret generator and projected into the defectdojo-db Secret as
# DD_DATABASE_URL. The generator reads the path ONCE per refresh (consistent
# user/password pair) and authenticates as a dedicated SA in this namespace
# (bound to the Vault defectdojo-db role). Reloader restarts the app onto rotated
# creds (see defectdojo.celery.annotations).
dynamicCreds:
  enabled: true
  serviceAccount: defectdojo-db # SA the generator authenticates as (this ns)
  vaultServer: "http://vault.vault.svc:8200"
  vaultAuthMount: kubernetes
  vaultRole: defectdojo-db # Vault k8s auth role bound to the SA above
  credsPath: "database/creds/defectdojo"

externalSecret:
  storeName: vault-backend # KV store, for the backup creds below
  vaultKey: cluster/skylab/apps/defectdojo

# --- DefectDojo app (upstream chart) ----------------------------------------
defectdojo:
  host: defectdojo.tail.skyf0l.dev
  siteUrl: "https://defectdojo.tail.skyf0l.dev"

  # External DB host → DD_DATABASE_HOST, which the wait-for-db init container
  # connects to. (django itself uses DD_DATABASE_URL, which carries the leased
  # user/password; this just points the readiness check + env at CNPG.)
  postgresServer: defectdojo-pg-rw.defectdojo.svc.cluster.local

  # All three chart-generated secrets are OFF: they default to randAlphaNum which
  # ArgoCD regenerates every sync (no helm lookup), churning the secrets + drifting
  # the admin password. Provided as stable ESO secrets instead (app-secrets.yaml),
  # seeded once in Vault.
  createSecret: false
  createValkeySecret: false
  createPostgresqlSecret: false

  # External Postgres: disable the bundled subchart; the app reaches CNPG through
  # the Vault-issued DD_DATABASE_URL (injected per-component below).
  postgresql:
    enabled: false

  # Broker: official Valkey image (not Bitnami). local-path isn't the default
  # StorageClass, so set it explicitly or the PVC stays Pending.
  valkey:
    enabled: true
    persistence:
      storageClass: local-path

  # Reachable only on the tailnet via the headscale-proxy IngressRoute, so the
  # chart's own ingress is off.
  django:
    # Restart django when the leased DB creds rotate (same as celery) — a pooled
    # app reads creds at boot, so without this it crash-loops when the lease ends.
    annotations:
      reloader.stakater.com/auto: "true"
    # The chart ships 4 uwsgi processes against a 512Mi limit; DefectDojo needs
    # ~300-500Mi per process, so workers thrash and the uwsgi socket drops (nginx
    # 502s). Fewer processes (the env comes from appSettings.processes) + headroom.
    uwsgi:
      appSettings:
        processes: 2
      # The chart dumps all of resources.* into the container's resources, so the
      # default processes/threads keys land in container resources (invalid k8s) and
      # break ArgoCD's diff. Null them out; the process count is set via appSettings.
      resources:
        processes: null
        threads: null
        requests:
          memory: 512Mi
        limits:
          memory: 1Gi
    ingress:
      enabled: false
    extraEnv: &ddDatabaseUrl
      - name: DD_DATABASE_URL
        valueFrom:
          secretKeyRef:
            name: defectdojo-db
            key: DD_DATABASE_URL

  # Every component that touches the DB gets the same dynamic DD_DATABASE_URL.
  initializer:
    staticName: true # stable Job name — friendlier to ArgoCD
    extraEnv: *ddDatabaseUrl
  dbMigrationChecker:
    extraEnv: *ddDatabaseUrl
  celery:
    # Deployment-level annotation (worker + beat) → Reloader restarts them when
    # the leased creds rotate.
    annotations:
      reloader.stakater.com/auto: "true"
    worker:
      extraEnv: *ddDatabaseUrl
    beat:
      extraEnv: *ddDatabaseUrl

# Trivy importer: a CronJob (parent-chart resource, not the upstream chart) that
# reimports trivy-operator VulnerabilityReports into DefectDojo. It logs in with the
# admin creds from the stable `defectdojo` secret and mints its own API token at
# runtime, so there is nothing to generate or seed by hand.
trivyImporter:
  enabled: true
  schedule: "0 */6 * * *" # every 6h
  image: python:3.12-slim
  product: skylab
  engagement: trivy-operator
  adminUser: admin
  ddUrl: http://defectdojo-django.defectdojo.svc
  ddHost: defectdojo.tail.skyf0l.dev
