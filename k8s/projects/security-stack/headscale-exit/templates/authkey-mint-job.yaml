{{- if .Values.authkeyMint.enabled }}
# Mints a REUSABLE Headscale pre-auth key (tagged .Values.tag = tag:tail-exit) for
# the exit node and writes it into authKeySecret. Self-healing: re-mints only when
# the stored key is missing OR no longer present in Headscale, so it never piles up
# keys yet also can't strand the node on a stale key (a deleted/pruned key leaves
# the secret populated but fails registration with "auth-key not found" on the next
# pod restart). PreSync hook (NOT PostSync): the exit Deployment can't go Healthy
# without this secret, and PostSync waits for Healthy. SA/RBAC weight 0, Job 1.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: headscale-exit-mint
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "0"
    helm.sh/hook-delete-policy: before-hook-creation
---
# Write the auth-key Secret in this namespace.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: headscale-exit-mint
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "0"
    helm.sh/hook-delete-policy: before-hook-creation
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: headscale-exit-mint
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "0"
    helm.sh/hook-delete-policy: before-hook-creation
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: headscale-exit-mint
subjects:
  - kind: ServiceAccount
    name: headscale-exit-mint
---
# Scoped exec into ONLY the Headscale pod: a Role in the headscale namespace
# pinned to the headscale-0 pod.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: headscale-exit-mint-exec
  namespace: {{ .Values.authkeyMint.headscaleNamespace }}
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "0"
    helm.sh/hook-delete-policy: before-hook-creation
rules:
  - apiGroups: [""]
    resources: ["pods"]
    resourceNames: [{{ .Values.authkeyMint.headscalePod | quote }}]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    resourceNames: [{{ .Values.authkeyMint.headscalePod | quote }}]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: headscale-exit-mint-exec
  namespace: {{ .Values.authkeyMint.headscaleNamespace }}
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "0"
    helm.sh/hook-delete-policy: before-hook-creation
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: headscale-exit-mint-exec
subjects:
  - kind: ServiceAccount
    name: headscale-exit-mint
    namespace: {{ .Release.Namespace }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: headscale-exit-mint
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "1"
    helm.sh/hook-delete-policy: hook-succeeded,before-hook-creation
spec:
  backoffLimit: 3
  activeDeadlineSeconds: 300
  template:
    spec:
      serviceAccountName: headscale-exit-mint
      restartPolicy: Never
      containers:
        - name: mint
          image: {{ .Values.authkeyMint.jobImage | quote }}
          command: ["/bin/sh", "-c"]
          env:
            - name: SECRET
              value: {{ .Values.authKeySecret | quote }}
            - name: HS_NS
              value: {{ .Values.authkeyMint.headscaleNamespace | quote }}
            - name: HS_POD
              value: {{ .Values.authkeyMint.headscalePod | quote }}
            - name: HS_USER
              value: {{ .Values.authkeyMint.user | quote }}
            - name: EXP
              value: {{ .Values.authkeyMint.expiration | quote }}
            - name: TAGS
              value: {{ .Values.tag | quote }}
          args:
            - |
              set -eu
              hs() { kubectl -n "$HS_NS" exec "$HS_POD" -c headscale -- headscale "$@"; }
              echo "Waiting for the Headscale CLI..."
              i=0; until hs users list >/dev/null 2>&1; do
                i=$((i+1)); [ "$i" -ge 30 ] && { echo "headscale not responding" >&2; exit 1; }
                sleep 2
              done
              # Self-healing guard: skip ONLY if the stored key is still present in
              # Headscale. A plain "secret populated?" check can't tell a live key from
              # a stale one, so a deleted/pruned key leaves the secret full but strands
              # the exit node on its next restart. `preauthkeys list` MASKS the secret
              # (hskey-auth-<id>-***), so match on the key's stable prefix, not the
              # full string. (Doesn't catch an expired-but-still-listed key, but the
              # key is minted with .Values.authkeyMint.expiration = 999d.)
              STORED=$(kubectl get secret "$SECRET" -o jsonpath='{.data.authkey}' 2>/dev/null | base64 -d 2>/dev/null || true)
              if [ -n "${STORED:-}" ]; then
                PREFIX=$(printf '%s' "$STORED" | cut -c1-20)
                if hs preauthkeys list -o json 2>/dev/null | grep -qF "$PREFIX"; then
                  echo "$SECRET holds a key still present in Headscale ($PREFIX...); nothing to mint."
                  exit 0
                fi
                echo "stored key ($PREFIX...) is gone from Headscale (stale); re-minting."
              fi
              # Resolve the numeric user id for HS_USER (tabs stripped — 0.28 JSON is tab-indented).
              UID_=$(hs users list -o json 2>/dev/null \
                | tr -d ' \t\n' | grep -oE '\{"id":"?[0-9]+"?,"name":"'"$HS_USER"'"' | grep -oE '[0-9]+' | head -1)
              if [ -z "${UID_:-}" ]; then echo "user $HS_USER not found" >&2; hs users list >&2; exit 1; fi
              echo "minting reusable key for $HS_USER (id $UID_) with tags [$TAGS]..."
              # Tags MUST be baked into the key: authkey-registered nodes can't self-request tags.
              KEY=$(hs preauthkeys create --user "$UID_" --reusable --expiration "$EXP" ${TAGS:+--tags "$TAGS"} 2>&1 \
                | grep -oE '[a-z]+key-[A-Za-z0-9_.-]+|[a-f0-9]{48,}' | head -1)
              [ -n "${KEY:-}" ] || { echo "could not extract pre-auth key" >&2; exit 1; }
              kubectl create secret generic "$SECRET" --from-literal=authkey="$KEY" \
                --dry-run=client -o yaml | kubectl apply -f -
              echo "wrote $SECRET."
          resources:
            requests: { cpu: 10m, memory: 32Mi }
            limits: { memory: 128Mi }
{{- end }}
