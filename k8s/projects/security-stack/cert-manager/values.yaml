cert-manager:
  # Install the cert-manager CRDs with the chart and keep them on uninstall.
  crds:
    enabled: true
    keep: true

  # Prometheus metrics + ServiceMonitor for the cert-manager dashboard, certificate expiry / renewal visibility.
  prometheus:
    enabled: true
    servicemonitor:
      enabled: true

  # Default issuer: any Ingress with a `tls` block (incl. a secretName) but no
  # explicit cert-manager.io/cluster-issuer annotation auto-gets a cert from
  # this issuer. This is the "auto-resolve certs for everything" behaviour.
  ingressShim:
    defaultIssuerName: letsencrypt-prod
    defaultIssuerKind: ClusterIssuer
    defaultIssuerGroup: cert-manager.io

  # Runs on the VPS control-plane; the Pi light node is tainted NoSchedule so
  # nothing here needs a toleration.
