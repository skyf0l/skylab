apiVersion: v1
kind: ConfigMap
metadata:
  name: headscale-config
  labels:
    app: headscale
data:
  config.yaml: |
    server_url: https://{{ .Values.host }}
    listen_addr: 0.0.0.0:8080
    metrics_listen_addr: 127.0.0.1:9090
    grpc_listen_addr: 0.0.0.0:50443
    grpc_allow_insecure: false
    noise:
      private_key_path: {{ .Values.dataPath }}/noise_private.key
    prefixes:
      v4: {{ .Values.config.ipPrefixes.v4 | quote }}
      v6: {{ .Values.config.ipPrefixes.v6 | quote }}
      allocation: sequential
    database:
      type: sqlite
      sqlite:
        path: {{ .Values.dataPath }}/db.sqlite
    log:
      level: {{ .Values.config.logLevel }}
    policy:
      mode: file
      path: /etc/headscale/acl.json
    dns:
      magic_dns: {{ .Values.config.dns.magicDns }}
      base_domain: {{ .Values.config.dns.baseDomain | quote }}
      nameservers:
        global:
          {{- range .Values.config.dns.nameservers }}
          - {{ . | quote }}
          {{- end }}
      # Maintained at runtime by the resolver sidecar (Traefik's live ClusterIP).
      extra_records_path: {{ .Values.resolver.recordsPath | quote }}
    derp:
      server:
        enabled: {{ .Values.config.derp.serverEnabled }}
      urls:
        {{- range .Values.config.derp.urls }}
        - {{ . | quote }}
        {{- end }}
      auto_update_enabled: {{ .Values.config.derp.autoUpdate }}
      update_frequency: 24h
    ephemeral_node_inactivity_timeout: 30m
  acl.json: |
{{ .Values.config.acl | toJson | indent 4 }}
  resolve.sh: |
    #!/bin/sh
    # Resolve Traefik's ClusterIP and write the .tail A-records to a file that
    # Headscale hot-reloads (dns.extra_records_path). No hardcoded IP, no RBAC.
    set -eu
    OUT="{{ .Values.resolver.recordsPath }}"
    FQDN="{{ .Values.resolver.traefikService }}"
    BASE="{{ .Values.tailBaseDomain }}"
    HOSTS="{{ range .Values.tailHosts }}{{ . }} {{ end }}"
    ip="$(nslookup "$FQDN" 2>/dev/null | awk '/^Address/{ if ($0 !~ /:53/) a=$NF } END{ print a }')"
    if [ -z "$ip" ]; then echo "resolve $FQDN failed" >&2; exit 1; fi
    records=""
    add() { [ -z "$records" ] || records="$records,"; records="$records$1"; }
    for h in $HOSTS; do
      add "{\"name\":\"$h.$BASE\",\"type\":\"A\",\"value\":\"$ip\"}"
    done
    {{- range .Values.config.dns.extraRecords }}
    add '{"name":"{{ .name }}","type":"{{ .type }}","value":"{{ .value }}"}'
    {{- end }}
    printf '[%s]\n' "$records" > "$OUT.tmp" && mv "$OUT.tmp" "$OUT"
    chmod 0644 "$OUT"
    echo "wrote $OUT ($ip)"
