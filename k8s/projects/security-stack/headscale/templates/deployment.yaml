apiVersion: apps/v1
kind: Deployment
metadata:
  name: headscale
  labels:
    app: headscale
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: headscale
  template:
    metadata:
      labels:
        app: headscale
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
    spec:
      securityContext:
        fsGroup: 1000
      initContainers:
        # Seed the extra-records file before Headscale starts (so it never boots
        # with a missing dns.extra_records_path).
        - name: seed-records
          image: {{ .Values.resolver.image }}
          command: ["sh", "/etc/headscale/resolve.sh"]
          volumeMounts:
            - name: config
              mountPath: /etc/headscale
              readOnly: true
            - name: shared
              mountPath: /shared
      containers:
        - name: headscale
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["serve"]
          ports:
            - name: http
              containerPort: 8080
            - name: grpc
              containerPort: 50443
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 96Mi
            limits:
              memory: 256Mi
          volumeMounts:
            - name: config
              mountPath: /etc/headscale
              readOnly: true
            - name: data
              mountPath: {{ .Values.dataPath }}
            - name: shared
              mountPath: /shared
        # Keeps the .tail records pointed at Traefik's live ClusterIP.
        - name: records-resolver
          image: {{ .Values.resolver.image }}
          command:
            - sh
            - -c
            - "while true; do sh /etc/headscale/resolve.sh || true; sleep {{ .Values.resolver.intervalSeconds }}; done"
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              memory: 32Mi
          volumeMounts:
            - name: config
              mountPath: /etc/headscale
              readOnly: true
            - name: shared
              mountPath: /shared
      volumes:
        - name: config
          configMap:
            name: headscale-config
        - name: data
          persistentVolumeClaim:
            claimName: headscale-data
        - name: shared
          emptyDir: {}
