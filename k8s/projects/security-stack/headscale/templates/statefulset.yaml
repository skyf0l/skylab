apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: headscale
  labels:
    app: headscale
spec:
  replicas: 1
  serviceName: headscale
  selector:
    matchLabels:
      app: headscale
  template:
    metadata:
      labels:
        app: headscale
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
    spec:
      securityContext:
        fsGroup: 1000
      containers:
        - name: headscale
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["serve"]
          ports:
            - name: http
              containerPort: 8080
            - name: grpc
              containerPort: 50443
            {{- if .Values.config.derp.server.enabled }}
            # Embedded DERP STUN endpoint. hostPort binds it to the VPS's public IP
            # (Cilium kube-proxy-replacement implements hostPort) so clients can STUN
            # for NAT discovery. REQUIRES inbound UDP 3478 open in the VPS firewall.
            # The DERP relay itself needs no port here — it rides the existing
            # headscale.<domain>:443 Traefik route.
            - name: stun
              containerPort: 3478
              hostPort: 3478
              protocol: UDP
            {{- end }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 96Mi
            limits:
              memory: 256Mi
          volumeMounts:
            - name: config
              mountPath: /etc/headscale
              readOnly: true
            - name: data
              mountPath: {{ .Values.dataPath }}
      volumes:
        - name: config
          configMap:
            name: headscale-config
        - name: data
          persistentVolumeClaim:
            claimName: headscale-data
