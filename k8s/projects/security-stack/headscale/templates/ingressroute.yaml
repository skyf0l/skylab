{{- if .Values.ingress.enabled }}
# Public coordination endpoint for tailnet clients (headscale.<domain>).
# A Traefik IngressRoute (CRD), NOT a k8s Ingress: the cluster's only ingress is
# Traefik (ClusterIP svc, no LB status), so a k8s Ingress never gets
# status.loadBalancer populated and ArgoCD wedges it on "Progressing" forever —
# which blocks the PostSync create-users hook. IngressRoute has no such gate.
# This one is intentionally PUBLIC (no tailnet ipAllowList): clients must reach it.
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: headscale
  labels:
    app: headscale
spec:
  entryPoints:
    - {{ .Values.ingress.entryPoint }}
  routes:
    - kind: Rule
      match: Host(`{{ tpl .Values.host . }}`)
      services:
        - name: headscale
          port: http
  tls:
    secretName: {{ .Values.ingress.tlsSecretName }}
{{- end }}
