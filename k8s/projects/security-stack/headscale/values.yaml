image:
  repository: docker.io/headscale/headscale
  tag: "0.28.0"
  pullPolicy: IfNotPresent

# Cluster domain, injected by the ApplicationSet from clusters/<name>/config.json.
# Every hostname/identity below derives from it via the chart's `tpl` calls — so
# the domain is never hardcoded. A new cluster only changes global.domain.
global:
  domain: ""

# Public coordination endpoint (used for both the Ingress host and server_url).
host: 'headscale.{{ .Values.global.domain }}'

# Public coordination endpoint, exposed via a Traefik IngressRoute (NOT a k8s
# Ingress — see templates/ingressroute.yaml for why) + a cert-manager Certificate.
ingress:
  enabled: true
  entryPoint: websecure
  clusterIssuer: letsencrypt-prod
  tlsSecretName: headscale-tls

storage:
  size: 1Gi
  storageClassName: local-path

# State/db live here (PVC mount).
dataPath: /var/lib/headscale

# Image for the in-cluster bootstrap Jobs (needs kubectl + sh). Matches vault-init.
jobImage: alpine/kubectl:1.36.1

# Stable pod name (StatefulSet ordinal-0) — exec RBAC is pinned to it.
podName: headscale-0

# Admin UIs are reachable on the tailnet via per-service headscale-proxy nodes
# (chart: headscale-proxy): a node named <svc> registers as <svc>.<baseDomain>
# and forwards to Traefik, which terminates TLS and routes by Host. No resolver
# sidecar / extra_records anymore — MagicDNS resolves the proxy nodes natively.

# Declarative tailnet users. A post-install/upgrade Job creates these and PRUNES
# any Headscale user not in this list. skypwn = personal devices; infra = owns
# the router tag + mints the router key; ci = the GitHub Actions identity that
# owns tag:ci and under which the CI pre-auth key is minted. Pre-auth keys are
# minted by Jobs too.
users:
  - 'skypwn@{{ .Values.global.domain }}'
  - 'infra@{{ .Values.global.domain }}'
  - 'ci@{{ .Values.global.domain }}'

# Append-only overlay for private users (e.g. friends), concatenated onto `users`
# above by the create-users-job (prune-safe). Empty here; supplied by the private
# values overlay (skylab-private) via a multi-source Application, so personal
# identities never land in the public repo.
extraUsers: []

# Append-only overlay for private ACL rules (e.g. "friend may reach my laptop:port"),
# concatenated onto config.acl.acls when acl.json is rendered. Empty here; supplied by
# the private overlay. Same shape as config.acl.acls entries, e.g.:
#   - { action: accept, src: ['friend@domain'], dst: ['100.x.y.z:8080'] }
extraAcls: []

# ---- Headscale server config (rendered into config.yaml) ----
config:
  logLevel: info

  ipPrefixes:
    v4: 100.64.0.0/10
    v6: fd7a:115c:a1e0::/48

  dns:
    magicDns: true
    # MagicDNS suffix for tailnet nodes. The headscale-proxy nodes are named
    # after the service (argocd, vault, ...) so they resolve as
    # <svc>.tail.<domain> — matching the Traefik IngressRoute hosts and the
    # *.tail.<domain> wildcard cert.
    baseDomain: 'tail.{{ .Values.global.domain }}'
    nameservers:
      - 1.1.1.1
      - 9.9.9.9

  derp:
    # Self-hosted DERP relay, embedded in this headscale process (no extra app, no
    # third-party image). DERP is the FALLBACK path used when two peers can't reach
    # each other directly — e.g. a phone on a strict office/corporate WiFi whose NAT
    # blocks UDP hole-punching. Without a self-hosted DERP, that fallback relays
    # through Tailscale's PUBLIC DERP servers (cross-region, not ours, flaky); with
    # it, the fallback is one controlled hop through this VPS.
    #
    # Reachability: the relay is served over headscale's HTTP listener, so it rides
    # the EXISTING public endpoint headscale.<domain>:443 (same Traefik route + cert)
    # — office-firewall-friendly. STUN is UDP/3478 (see statefulset hostPort).
    server:
      enabled: true
      regionId: 900
      regionCode: skylab
      regionName: "Skylab VPS"
      # Only nodes registered in THIS headscale may relay (rejects strangers using it
      # as an open bandwidth relay). On by default; kept explicit.
      verifyClients: true
      stunListenAddr: "0.0.0.0:3478"
      privateKeyPath: /var/lib/headscale/derp_server_private.key
      # Auto-publish this region into the derpmap clients receive — no hand-written map.
      automaticallyAddRegion: true
      # Optional STUN/DERP IP hints. LEFT EMPTY ON PURPOSE: headscale always sets the
      # region node's HostName to headscale.<domain>, so clients resolve that A/AAAA
      # record (which already points at the node for the control endpoint) for both
      # DERP :443 and STUN :3478 — nothing to hardcode, and it auto-follows DNS if the
      # node/IP ever changes. Only set these to PIN a specific IP, e.g. if the control
      # record is Cloudflare-proxied and you need clients to bypass the proxy.
      ipv4: ""
      ipv6: ""
    # Drop the public Tailscale derpmap. If kept, a far client (e.g. you on mobile in
    # another region) picks a nearer PUBLIC relay by latency and never uses ours, so
    # nothing improves. Empty => our region is the ONLY relay and all fallback traffic
    # goes through the VPS we control. (Our DERP shares fate with headscale itself, so
    # it's no worse a single point of failure than the control server already is.)
    urls: []
    paths: []
    autoUpdate: false

  acl:
    # infra owns the proxy + exit tags (keeps them off your personal identity).
    tagOwners:
      "tag:tail-proxy": ['infra@{{ .Values.global.domain }}']
      "tag:tail-exit": ['infra@{{ .Values.global.domain }}']
      # The GitHub Actions Vault runner registers under this tag.
      "tag:ci": ['ci@{{ .Values.global.domain }}']
    # Auto-approve the exit-node route (0.0.0.0/0 + ::/0) advertised by any node
    # tagged tag:tail-exit (chart: headscale-exit) — no manual
    # `headscale nodes approve-routes` step needed.
    autoApprovers:
      exitNode: ['tag:tail-exit']
    acls:
      # skypwn reaches the per-service admin proxies (argocd/vault/grafana/hubble).
      - action: accept
        src: ['skypwn@{{ .Values.global.domain }}']
        dst:
          - "tag:tail-proxy:*"
      # skypwn may route ALL its traffic out through the exit node (full VPN):
      # `tailscale up --exit-node=exit.tail.<domain>`. Using an exit node requires
      # an explicit dst of autogroup:internet.
      - action: accept
        src: ['skypwn@{{ .Values.global.domain }}']
        dst:
          - "autogroup:internet:*"
      # The Vault CI runner (tag:ci) reaches the admin proxies on 443 only — enough
      # to hit vault.tail.<domain>; it can't touch personal devices, the exit node,
      # or the cluster directly. (All proxies share tag:tail-proxy, so this also
      # technically allows the other admin proxies; split the proxy tag if you want
      # to pin it to the Vault node alone.)
      - action: accept
        src: ['tag:ci']
        dst:
          - "tag:tail-proxy:443"
