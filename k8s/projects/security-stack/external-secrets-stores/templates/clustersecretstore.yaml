apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: {{ .Values.vault.storeName }}
spec:
  provider:
    vault:
      server: {{ .Values.vault.server | quote }}
      path: {{ .Values.vault.kvPath | quote }}
      version: {{ .Values.vault.kvVersion | quote }}
      {{- with .Values.vault.caBundle }}
      caBundle: {{ . | quote }}
      {{- end }}
      auth:
        kubernetes:
          mountPath: {{ .Values.vault.authMount | quote }}
          role: {{ .Values.vault.role | quote }}
          serviceAccountRef:
            name: {{ .Values.vault.serviceAccount | quote }}
            namespace: {{ .Values.vault.serviceAccountNamespace | quote }}
{{- if .Values.database.enabled }}
---
# Second store for reading dynamic credentials from the database secrets engine
# (database/creds/<role>). Same Vault + auth as above; the database engine is a
# v1-style mount (not KV v2). ESO can't use the cross-namespace SA from a
# generator, but a ClusterSecretStore can — so dynamic-DB apps read through this.
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: {{ .Values.database.storeName }}
spec:
  provider:
    vault:
      server: {{ .Values.vault.server | quote }}
      path: {{ .Values.database.path | quote }}
      version: {{ .Values.database.version | quote }}
      {{- with .Values.vault.caBundle }}
      caBundle: {{ . | quote }}
      {{- end }}
      auth:
        kubernetes:
          mountPath: {{ .Values.vault.authMount | quote }}
          role: {{ .Values.vault.role | quote }}
          serviceAccountRef:
            name: {{ .Values.vault.serviceAccount | quote }}
            namespace: {{ .Values.vault.serviceAccountNamespace | quote }}
{{- end }}
