{{- if .Values.externalSecret.enabled }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: authelia-secrets
  labels:
    app: authelia
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: {{ .Values.externalSecret.storeName }}
    kind: ClusterSecretStore
  target:
    name: authelia-secrets
    creationPolicy: Owner
  data:
    - secretKey: jwt
      remoteRef: { key: {{ .Values.externalSecret.vaultKey | quote }}, property: jwt_secret }
    - secretKey: session
      remoteRef: { key: {{ .Values.externalSecret.vaultKey | quote }}, property: session_secret }
    - secretKey: storage.encryption
      remoteRef: { key: {{ .Values.externalSecret.vaultKey | quote }}, property: storage_encryption_key }
    - secretKey: oidc.hmac
      remoteRef: { key: {{ .Values.externalSecret.vaultKey | quote }}, property: oidc_hmac_secret }
    - secretKey: oidc.jwks.key
      remoteRef: { key: {{ .Values.externalSecret.vaultKey | quote }}, property: oidc_jwks_key }
    - secretKey: users.yml
      remoteRef: { key: {{ .Values.externalSecret.vaultKey | quote }}, property: users_yaml }
    - secretKey: chatgpt.redirect
      remoteRef: { key: {{ .Values.externalSecret.vaultKey | quote }}, property: chatgpt_redirect_uri }
{{- end }}
