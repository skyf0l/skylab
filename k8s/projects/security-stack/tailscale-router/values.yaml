image: tailscale/tailscale:v1.78.1

# In-cluster Headscale (use the internal Service to avoid the public round-trip).
loginServer: http://headscale.headscale.svc.cluster.local
hostname: lab-subnet-router

# Advertise the service CIDR so tailnet members reach ClusterIPs (incl. Traefik).
advertiseRoutes: "10.43.0.0/16"

# Tag owned by skypwn@skyf0l.dev in the Headscale ACL — makes the advertised
# route auto-approve (autoApprovers).
advertiseTags: "tag:k8s-router"

authKeySecret: tailscale-authkey
authKeySecretKey: authkey

# Auto-mint the router's pre-auth key into authKeySecret — no manual step.
# A PreSync Job execs Headscale (scoped Role on the headscale-0 pod), mints a
# REUSABLE key for `user`, and writes the Secret. Skips if already populated.
# PreSync (not PostSync) so the secret exists before the router Deployment starts.
authkeyMint:
  enabled: true
  user: infra@skyf0l.dev
  headscaleNamespace: headscale
  headscalePod: headscale-0   # exec RBAC is pinned to this pod only
  jobImage: alpine/kubectl:1.36.1
  expiration: 999d
