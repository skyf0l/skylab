apiVersion: v1
kind: ServiceAccount
metadata:
  name: tailscale-router
  labels:
    app: tailscale-router
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: tailscale-router
  labels:
    app: tailscale-router
rules:
  # tailscaled persists node state in a Secret (TS_KUBE_SECRET).
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "update", "patch", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: tailscale-router
  labels:
    app: tailscale-router
subjects:
  - kind: ServiceAccount
    name: tailscale-router
roleRef:
  kind: Role
  name: tailscale-router
  apiGroup: rbac.authorization.k8s.io
