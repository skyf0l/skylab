{{- if .Values.dynamicCreds.enabled }}
# Leased Cloudflare DNS token from the custom cloudflare secrets engine via the
# ESO VaultDynamicSecret generator (defectdojo-db pattern). The generator reads
# cloudflare/creds/<role> ONCE per refresh and caches the lease; it
# authenticates as the external-dns SA in THIS namespace (a namespaced
# generator can't use the external-secrets SA cross-namespace). The Deployment
# carries a Reloader annotation to restart onto the rotated token.
apiVersion: generators.external-secrets.io/v1alpha1
kind: VaultDynamicSecret
metadata:
  name: external-dns-cloudflare
  labels:
    app: external-dns
spec:
  path: {{ .Values.dynamicCreds.credsPath | quote }}
  method: GET
  provider:
    server: {{ .Values.dynamicCreds.vaultServer | quote }}
    auth:
      kubernetes:
        mountPath: {{ .Values.dynamicCreds.vaultAuthMount | quote }}
        role: {{ .Values.dynamicCreds.vaultRole | quote }}
        serviceAccountRef:
          name: {{ .Values.dynamicCreds.serviceAccount | quote }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: external-dns-cloudflare
  labels:
    app: external-dns
spec:
  # Refresh well inside the role's TTL (24h) so the token never expires before
  # renewal.
  refreshInterval: {{ .Values.dynamicCreds.refreshInterval }}
  target:
    name: external-dns-cloudflare
    creationPolicy: Owner
    template:
      data:
        # The engine returns the minted token as `token`.
        api_token: "{{ `{{ .token }}` }}"
  dataFrom:
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: VaultDynamicSecret
          name: external-dns-cloudflare
{{- end }}
