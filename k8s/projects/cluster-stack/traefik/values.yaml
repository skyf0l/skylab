traefik:
  # Prometheus metrics + ServiceMonitor for the Traefik dashboard.
  # entry-point / router / service labels enrich the per-route panels.
  metrics:
    prometheus:
      addEntryPointsLabels: true
      addRoutersLabels: true
      addServicesLabels: true
      service:
        enabled: true
      serviceMonitor:
        enabled: true
      # The Prometheus CRDs aren't visible during `helm template` (no cluster);
      # they exist in-cluster (kube-prometheus). Skip the API check so offline
      # `make template` renders the ServiceMonitor instead of failing.
      disableAPICheck: true

# Cluster entrypoint DNS (wildcard + apex A records) — see
# templates/dnsendpoint.yaml. domain/publicIp are injected by the
# ApplicationSet from clusters/<name>/config.json.
ingressDns:
  enabled: true
  domain: ""
  publicIp: ""
