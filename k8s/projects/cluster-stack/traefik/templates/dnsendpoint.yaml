{{- if and .Values.ingressDns.enabled .Values.ingressDns.publicIp }}
# The cluster's public entrypoint (the de facto LB — hostPort DaemonSet, no
# cloud LB): wildcard for every *.<domain> app + the apex. Both values are
# injected by the ApplicationSet from clusters/<name>/config.json
# (global.domain / global.publicIp), so an IP change is one config.json edit.
# Owned by external-dns (cluster-stack) via its TXT registry.
apiVersion: externaldns.k8s.io/v1alpha1
kind: DNSEndpoint
metadata:
  name: traefik-ingress
  labels:
    app.kubernetes.io/name: traefik
spec:
  endpoints:
    # DNS-only: subdomains include non-proxiable endpoints (mail, tailnet);
    # per-host proxying can be added later as explicit records.
    - dnsName: "*.{{ .Values.ingressDns.domain }}"
      recordType: A
      recordTTL: 300
      targets: [{{ .Values.ingressDns.publicIp | quote }}]
    # Apex stays Cloudflare-proxied (origin IP hidden; TTL is auto when proxied).
    # NOTE: ownership (txtPrefix edns-%{record_type}-) is per (name, type) rrset
    # — Email Routing's MX/SPF do NOT block this A. Only the pre-existing manual
    # apex A does: no ownership TXT, so external-dns silently drops the update.
    # Zero-downtime handover = create the adoption TXT once (then this record is
    # reconciled in place, proxied kept):
    #   edns-a-<domain> TXT "heritage=external-dns,external-dns/owner=skylab,external-dns/resource=crd/traefik/traefik-ingress"
    # (Alternative: delete the manual A and wait one sync — brief apex gap.)
    # The apex MX/SPF cutover gate (stalwart domains[].mx) is separate and still
    # requires disabling Email Routing: CF locks its records against the API.
    - dnsName: {{ .Values.ingressDns.domain | quote }}
      recordType: A
      targets: [{{ .Values.ingressDns.publicIp | quote }}]
      providerSpecific:
        - name: external-dns.alpha.kubernetes.io/cloudflare-proxied
          value: "true"
{{- end }}
