traefik:
  # Allow IngressRoutes (in the tailscale namespace, from the headscale-proxy
  # chart) to reference Services in other namespaces (the tailnet-only admin UIs).
  providers:
    kubernetesCRD:
      allowCrossNamespace: true

  # Listen on all nodes
  deployment:
    kind: DaemonSet

  # hostPort 80/443 means only one Traefik pod can exist per node. The chart
  # default (maxSurge 1 / maxUnavailable 0) tries to start the new pod BEFORE
  # killing the old one, so on a single node the new pod is stuck Pending on a
  # port conflict and the rollout deadlocks. Delete-then-create instead.
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1

  # Run the ingress DaemonSet on the tainted light (Pi) node too, so ingress
  # is reachable on every node.
  tolerations:
    - key: node-role.skylab/light
      operator: Exists
      effect: NoSchedule

  service:
    type: ClusterIP

  ports:
    web:
      hostPort: 80
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: true
    websecure:
      hostPort: 443

  # Enable the internal API/dashboard
  api:
    insecure: true
    dashboard: true

  # Create the dashboard IngressRoute
  ingressRoute:
    dashboard:
      enabled: true
      # Custom match rule with host domain
      matchRule: Host(`traefik.skyf0l.dev`) && (PathPrefix(`/dashboard`) || PathPrefix(`/api`))
      entryPoints: ["websecure"]
