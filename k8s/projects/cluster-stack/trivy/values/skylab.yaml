trivy-operator:
  operator:
    # Reduce concurrent scan jobs to limit resource usage
    scanJobsConcurrentLimit: 2
    # Show CVE IDs in vulnerability reports
    metricsVulnIdEnabled: true
    # Allow scan jobs to run on the tainted light (Pi) node so its workloads
    # are scanned too.
    scanJobTolerations:
      - key: node-role.skylab/light
        operator: Exists
        effect: NoSchedule
