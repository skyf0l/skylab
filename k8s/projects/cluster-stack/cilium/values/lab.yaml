cilium:
  # Single-node cluster: the operator defaults to 2 replicas with hostname
  # anti-affinity, so the 2nd never schedules. Run one.
  operator:
    replicas: 1

  hubble:
    ui:
      enabled: true
      # NOT publicly exposed. Reach it via `cilium hubble ui` / port-forward,
      # or over the tailnet once Headscale is wired.
      ingress:
        enabled: false
