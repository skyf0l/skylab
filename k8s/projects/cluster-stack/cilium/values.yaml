cilium:
  rollOutCiliumPods: true
  kubeProxyReplacement: "true"

  # AUDIT MODE (temporary): CiliumNetworkPolicies are evaluated and would-be-drops are
  # logged to Hubble as verdict AUDIT, but NOTHING is actually dropped. This lets the
  # network-policies chart (security-stack) roll out zero-risk: watch
  # `hubble observe --verdict AUDIT` to see what a policy WOULD block, add exceptions,
  # then set this back to false to ENFORCE. Cluster-wide setting (no per-policy audit).
  policyAuditMode: true

  cni:
    install: true
    uninstall: false

  ipam:
    mode: kubernetes

  # Agent + operator Prometheus metrics, scraped by the select-all Prometheus.
  prometheus:
    enabled: true
    serviceMonitor:
      enabled: true
      # The Prometheus CRDs aren't visible during `helm template` (no cluster), so
      # the chart's guard would fail offline renders. They do exist in-cluster
      # (kube-prometheus). This flag trusts that and lets `make template` pass.
      trustCRDsExist: true
  operator:
    prometheus:
      enabled: true
      serviceMonitor:
        enabled: true

  hubble:
    enable: true
    # In-memory ring buffer of recent flows shown when the UI opens (default 4095 =
    # only seconds of traffic). 65535 (the max, must be 2^n-1) holds several minutes
    # on a low-traffic cluster — count-based, not time, so the window shrinks under
    # bursts. RAM-only (~10-15MB/agent) and cleared on cilium-agent restart; for
    # durable history, export flows to Loki instead.
    eventBufferCapacity: "65535"
    # Hubble flow metrics → Prometheus: aggregate rates/drops/HTTP by namespace.
    # NB: port-distribution is intentionally OFF — it emitted ~41k series (one per
    # src/dst port), ~21% of the whole TSDB, and dwarfed every Thanos block in R2
    # for near-zero value. Don't re-enable on the R2 free tier.
    metrics:
      enabled:
        - dns
        - drop
        - tcp
        - flow
        - icmp
        - http
      serviceMonitor:
        enabled: true
    relay:
      enabled: true
    ui:
      enabled: true
