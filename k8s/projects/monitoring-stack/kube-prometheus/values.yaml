kube-prometheus-stack:
  nodeExporter:
    operatingSystems:
      aix:
        enabled: false
      darwin:
        enabled: false

  grafana:
    ingress:
      enabled: true

    # Datasources (Prometheus default + Alertmanager + Loki below) are written by
    # the grafana_datasource sidecar into an emptyDir shared with the main grafana
    # container. By default the watch sidecar writes that file a few seconds AFTER
    # grafana has already run its one-shot provisioning, and it skips the reload on
    # its initial sync — so only the DB-persisted Prometheus shows and Loki/
    # Alertmanager never load. Run the sidecar ALSO as a native initContainer
    # (restartPolicy: Always, k8s >=1.29) so the file is written before grafana
    # provisions; the startupProbe gates grafana on the sidecar's initial sync
    # being complete (kiwigrid serves /healthz on 8081 — 8080 is already taken by
    # the dashboards sidecar's health server).
    sidecar:
      datasources:
        initDatasources: true
        restartPolicy: Always
        startupProbe:
          httpGet:
            path: /healthz
            port: 8081
          periodSeconds: 2
          failureThreshold: 30

    # Loki as a log datasource (Explore → logs). Points at the in-cluster Loki
    # gateway; Prometheus stays the default metrics datasource.
    additionalDataSources:
      - name: Loki
        type: loki
        uid: loki
        access: proxy
        url: http://loki-gateway.logging.svc.cluster.local
        isDefault: false
      # Thanos Query — same Prometheus API, but spans long-term history from R2
      # (recent data via the sidecar + historical via the store-gateway). Left
      # NON-default so existing dashboards are unaffected; to get long-term range
      # in every bundled dashboard, make THIS the default instead of the built-in
      # Prometheus datasource (they're API-compatible).
      - name: Thanos
        type: prometheus
        uid: thanos
        access: proxy
        url: http://thanos-query.monitoring.svc.cluster.local:9090
        isDefault: false
        jsonData:
          timeInterval: 30s

    # Persist dashboards/settings across restarts. storageClass + enable are the
    # cluster-agnostic defaults; the SIZE is tuned per-cluster in values/<c>.yaml.
    persistence:
      enabled: true
      storageClassName: local-path
      size: 2Gi
    # RWO volume: replace the pod in place so a config change can't leave two pods
    # contending for the PVC (fsGroup 472 already sets ownership at mount, so the
    # chown init is redundant — drop it).
    deploymentStrategy:
      type: Recreate
    initChownData:
      enabled: false

    # Community dashboards are vendored as JSON ConfigMaps under
    # k8s/projects/monitoring-stack/grafana-dashboards and hot-loaded by the
    # dashboard sidecar (no init container, no grafana.com egress at boot).

  prometheus:
    # Headless service exposing the Thanos sidecar's gRPC (10901) so Thanos Query
    # can discover this Prometheus as a store. The thanos chart's query --endpoint
    # uses dnssrv+ against this service; verify its name with:
    #   kubectl -n monitoring get svc | grep thanos-discovery
    thanosService:
      enabled: true
    prometheusSpec:
      # Select ALL ServiceMonitors/PodMonitors.
      serviceMonitorSelectorNilUsesHelmValues: false
      podMonitorSelectorNilUsesHelmValues: false
      # Fast tier: 15d of full-resolution data on local disk for snappy recent
      # queries. Long-term (12 months) lives in R2 via Thanos and is queried
      # through Thanos Query, which de-dups the overlap. NB: with compaction
      # disabled below, 15d is stored as ~180 uncompacted 2h blocks — a bit more
      # disk than compacted; bump storage below (or drop retention) if it fills.
      retention: 15d
      # The Thanos sidecar owns block upload to R2; if Prometheus also compacted
      # locally it would rewrite blocks the sidecar already shipped (overlapping
      # blocks / corruption). Hand compaction entirely to the Thanos compactor.
      disableCompaction: true
      # Inject the Thanos sidecar and point it at R2. The objstore Secret is
      # created in this namespace by the thanos chart's ExternalSecret (ESO).
      thanos:
        objectStorageConfig:
          existingSecret:
            name: thanos-objstore
            key: objstore.yml
      storageSpec:
        volumeClaimTemplate:
          spec:
            storageClassName: local-path
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 15Gi
