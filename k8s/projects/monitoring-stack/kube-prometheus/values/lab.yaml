kube-prometheus-stack:
  grafana:
    ingress:
      ingressClassName: traefik
      hosts:
        - grafana.skyf0l.dev
      tls:
        - hosts:
            - grafana.skyf0l.dev
    # Persist dashboards/settings across restarts.
    persistence:
      enabled: true
      size: 2Gi
      storageClassName: local-path

  prometheus:
    prometheusSpec:
      # Sized for the VPS disk; raise retention/storage as the disk allows.
      retention: 15d
      storageSpec:
        volumeClaimTemplate:
          spec:
            storageClassName: local-path
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 15Gi

  # node-exporter is a DaemonSet — must tolerate the light (Pi) node taint.
  prometheus-node-exporter:
    tolerations:
      - key: node-role.skylab/light
        operator: Exists
        effect: NoSchedule
