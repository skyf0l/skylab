# Thanos Query — stateless fan-in over the Prometheus sidecar (recent) and the
# store-gateway (historical/R2). This is the Prometheus-compatible API Grafana
# points at to see long-term data. No object-store access of its own.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: thanos-query
  labels:
    app.kubernetes.io/name: thanos-query
    app.kubernetes.io/part-of: thanos
spec:
  replicas: {{ .Values.query.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: thanos-query
  template:
    metadata:
      labels:
        app.kubernetes.io/name: thanos-query
        app.kubernetes.io/part-of: thanos
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: query
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - query
            - --log.level=info
            - --http-address=0.0.0.0:9090
            - --grpc-address=0.0.0.0:10901
            # Use 5m/1h rollups automatically for wide time ranges.
            - --query.auto-downsampling
            - --query.replica-label={{ .Values.query.replicaLabel }}
            {{- range .Values.query.stores }}
            - --endpoint={{ . }}
            {{- end }}
          ports:
            - name: http
              containerPort: 9090
            - name: grpc
              containerPort: 10901
          readinessProbe:
            httpGet: { path: /-/ready, port: http }
            initialDelaySeconds: 10
          livenessProbe:
            httpGet: { path: /-/healthy, port: http }
            initialDelaySeconds: 30
          resources: {{- toYaml .Values.query.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
---
apiVersion: v1
kind: Service
metadata:
  name: thanos-query
  labels:
    app.kubernetes.io/name: thanos-query
    app.kubernetes.io/part-of: thanos
spec:
  selector:
    app.kubernetes.io/name: thanos-query
  ports:
    - name: http # Grafana datasource -> http://thanos-query.monitoring.svc:9090
      port: 9090
      targetPort: http
    - name: grpc
      port: 10901
      targetPort: grpc
