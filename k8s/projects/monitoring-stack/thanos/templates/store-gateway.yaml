# Thanos Store Gateway — exposes the historical blocks sitting in R2 over the
# Thanos StoreAPI (gRPC) so Query can read them. Keeps a small local index/bucket
# cache on a PVC; the data of record lives in R2. RWO PVC -> Recreate strategy.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: thanos-store
  labels:
    app.kubernetes.io/name: thanos-store
    app.kubernetes.io/part-of: thanos
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: {{ .Values.storeGateway.persistence.storageClass }}
  resources:
    requests:
      storage: {{ .Values.storeGateway.persistence.size }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: thanos-store
  labels:
    app.kubernetes.io/name: thanos-store
    app.kubernetes.io/part-of: thanos
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: thanos-store
  template:
    metadata:
      labels:
        app.kubernetes.io/name: thanos-store
        app.kubernetes.io/part-of: thanos
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: store
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - store
            - --log.level=info
            - --data-dir=/data
            - --objstore.config-file=/etc/thanos/objstore.yml
            - --http-address=0.0.0.0:10902
            - --grpc-address=0.0.0.0:10901
            - --index-cache-size={{ .Values.storeGateway.indexCacheSize }}
            - --chunk-pool-size={{ .Values.storeGateway.chunkPoolSize }}
          ports:
            - name: http
              containerPort: 10902
            - name: grpc
              containerPort: 10901
          readinessProbe:
            httpGet: { path: /-/ready, port: http }
            initialDelaySeconds: 15
          livenessProbe:
            httpGet: { path: /-/healthy, port: http }
            initialDelaySeconds: 30
          resources: {{- toYaml .Values.storeGateway.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: data
              mountPath: /data
            - name: objstore
              mountPath: /etc/thanos
              readOnly: true
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: thanos-store
        - name: objstore
          secret:
            secretName: thanos-objstore
---
apiVersion: v1
kind: Service
metadata:
  name: thanos-store
  labels:
    app.kubernetes.io/name: thanos-store
    app.kubernetes.io/part-of: thanos
spec:
  selector:
    app.kubernetes.io/name: thanos-store
  ports:
    - name: grpc # consumed by thanos-query --endpoint
      port: 10901
      targetPort: grpc
    - name: http
      port: 10902
      targetPort: http
