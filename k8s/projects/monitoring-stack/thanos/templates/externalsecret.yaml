{{- if .Values.externalSecret.enabled }}
# Projects the dedicated R2 token (Object R/W on the skylab-thanos bucket) from
# Vault and templates it into a full Thanos objstore.yml in the thanos-objstore
# Secret. The store-gateway / compactor / kube-prometheus sidecar all mount this
# Secret's objstore.yml. The double-brace blocks below are ESO templates
# (backtick-escaped so Helm passes them through verbatim).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: thanos-objstore
  labels:
    app.kubernetes.io/part-of: thanos
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: {{ .Values.externalSecret.storeName }}
    kind: ClusterSecretStore
  target:
    name: thanos-objstore
    creationPolicy: Owner
    template:
      engine: v2
      data:
        objstore.yml: |
          type: S3
          config:
            bucket: {{ .Values.objstore.bucket | quote }}
            endpoint: {{ .Values.objstore.endpoint | quote }}
            region: {{ .Values.objstore.region | quote }}
            # R2-friendly: path-style addressing (= Loki's s3ForcePathStyle), and
            # no AWS SDK ambient auth / SigV2.
            bucket_lookup_type: path
            aws_sdk_auth: false
            signature_version2: false
            insecure: false
            access_key: {{ `"{{ .r2_access_key_id }}"` }}
            secret_key: {{ `"{{ .r2_secret_access_key }}"` }}
  data:
    - secretKey: r2_access_key_id
      remoteRef:
        key: {{ .Values.externalSecret.vaultKey | quote }}
        property: r2_access_key_id
    - secretKey: r2_secret_access_key
      remoteRef:
        key: {{ .Values.externalSecret.vaultKey | quote }}
        property: r2_secret_access_key
{{- end }}
