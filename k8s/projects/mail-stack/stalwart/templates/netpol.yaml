# Layer 2 — the mail ports must accept the whole internet (that's what a mail
# server is). hostPort traffic reaches the pod as `world`/`host` under Cilium
# KPR; `cluster` covers future in-cluster senders (svc :587/:25). The :8080
# HTTP surface stays on the Layer-1 universal allows (traefik + monitoring)
# plus intra-namespace (provisioning job). Additive to the ns-isolation policy
# from security-stack/network-policies (currently audit mode — validate with
# `hubble observe --verdict AUDIT` before enforcing).
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: stalwart-allow-mail
  labels:
    app: stalwart
spec:
  endpointSelector:
    matchLabels:
      app: stalwart
  ingress:
    - fromEntities:
        - world
        - host
        - remote-node
        - cluster
      toPorts:
        - ports:
            {{- range .Values.mailPorts }}
            - port: {{ .port | quote }}
              protocol: TCP
            {{- end }}
