{{- if .Values.externalSecret.enabled }}
# Core admin secret. Kept separate from the per-account passwords so a missing
# password_<name> Vault property can never break the fallback-admin credential.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: stalwart-secrets
  labels:
    app: stalwart
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: {{ .Values.externalSecret.storeName }}
    kind: ClusterSecretStore
  target:
    name: stalwart-secrets
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        # "user:password" — Stalwart's standing fallback admin env var.
        STALWART_RECOVERY_ADMIN: "{{ .Values.provision.adminUser }}:{{ `{{ .admin_password }}` }}"
        admin_password: "{{ `{{ .admin_password }}` }}"
        # username/password keys for the ServiceMonitor basicAuth.
        username: {{ .Values.provision.adminUser | quote }}
        password: "{{ `{{ .admin_password }}` }}"
  data:
    - secretKey: admin_password
      remoteRef: { key: {{ .Values.externalSecret.vaultKey | quote }}, property: admin_password }
---
{{- $accounts := include "stalwart.accounts" . | fromJsonArray }}
{{- if $accounts }}
# Per-account password hashes, consumed only by the provisioning job.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: stalwart-account-passwords
  labels:
    app: stalwart
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: {{ .Values.externalSecret.storeName }}
    kind: ClusterSecretStore
  target:
    name: stalwart-account-passwords
    creationPolicy: Owner
  data:
    {{- range $accounts }}
    - secretKey: password_{{ .name }}
      remoteRef: { key: {{ $.Values.externalSecret.vaultKey | quote }}, property: password_{{ .name }} }
    {{- end }}
{{- end }}
{{- end }}
