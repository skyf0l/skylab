# TLS for the mail protocols AND the public HTTPS hosts — one secret, referenced
# by the Ingress and mounted into the pod (the provisioning job registers a
# file-backed Certificate object pointing at the mounted PEMs). Explicit CR
# (not an ingress-shim cert): SMTP/IMAP need the files regardless of Ingress.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: stalwart
  labels:
    app: stalwart
spec:
  secretName: {{ .Values.tls.secretName }}
  issuerRef:
    name: {{ .Values.tls.clusterIssuer }}
    kind: ClusterIssuer
  dnsNames:
    - {{ .Values.host | quote }}
    {{- if .Values.autodiscovery }}
    - "autoconfig.{{ .Values.global.domain }}"
    - "autodiscover.{{ .Values.global.domain }}"
    {{- end }}
    {{- range .Values.tls.extraDnsNames }}
    - {{ tpl . $ | quote }}
    {{- end }}
{{- range include "stalwart.domains" . | fromJsonArray }}
{{- if ne .mailHost $.Values.host }}
---
# Own certificate for a domain that sets its own mailHost. Deliberately a
# SEPARATE Certificate rather than a SAN on the shared one: SANs would put both
# hostnames in a single Certificate Transparency entry, publicly linking the
# domains forever.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: stalwart-{{ .slug }}
  labels:
    app: stalwart
spec:
  secretName: stalwart-tls-{{ .slug }}
  issuerRef:
    name: {{ $.Values.tls.clusterIssuer }}
    kind: ClusterIssuer
  dnsNames:
    - {{ .mailHost | quote }}
{{- end }}
{{- end }}
