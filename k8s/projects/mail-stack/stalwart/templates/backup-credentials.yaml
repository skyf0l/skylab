{{- if .Values.backup.enabled }}
# R2 S3 credentials for barman WAL archiving + base backups, minted on demand
# by Vault's cloudflare secrets engine (r2-stalwart-backup role) — no static key
# in KV, same model as external-dns. barman reads the mounted secret per
# invocation, so a rotated credential is picked up without restarting Postgres.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.backup.serviceAccount }}
  labels:
    app: stalwart
---
apiVersion: generators.external-secrets.io/v1alpha1
kind: VaultDynamicSecret
metadata:
  name: stalwart-pg-backup
  labels:
    app: stalwart
spec:
  path: {{ .Values.backup.credsPath | quote }}
  method: GET
  provider:
    server: {{ .Values.backup.vaultServer | quote }}
    auth:
      kubernetes:
        mountPath: {{ .Values.backup.vaultAuthMount | quote }}
        role: {{ .Values.backup.vaultRole | quote }}
        serviceAccountRef:
          name: {{ .Values.backup.serviceAccount }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: stalwart-pg-backup
  labels:
    app: stalwart
spec:
  refreshInterval: {{ .Values.backup.refreshInterval }}
  target:
    name: stalwart-pg-backup
    creationPolicy: Owner
    template:
      data:
        # The engine derives an S3 keypair for r2_s3_credentials roles.
        ACCESS_KEY_ID: "{{ `{{ .r2_access_key_id }}` }}"
        ACCESS_SECRET_KEY: "{{ `{{ .r2_secret_access_key }}` }}"
  dataFrom:
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: VaultDynamicSecret
          name: stalwart-pg-backup
{{- end }}
