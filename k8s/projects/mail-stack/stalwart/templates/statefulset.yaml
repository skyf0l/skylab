apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: stalwart
  labels:
    app: stalwart
  annotations:
    # Restart on cert renewal (mail listeners read the PEM files at startup)
    # and on admin-secret rotation.
    secret.reloader.stakater.com/reload: "{{ .Values.tls.secretName }},stalwart-secrets,stalwart-pg-app"
spec:
  replicas: 1
  serviceName: stalwart
  selector:
    matchLabels:
      app: stalwart
  template:
    metadata:
      labels:
        app: stalwart
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
    spec:
      # No node-role.skylab/light toleration ON PURPOSE: the public mail server
      # (hostPorts + PTR + local-path data) must stay on the VPS, never the Pi.
      securityContext:
        runAsUser: 2000
        runAsGroup: 2000
        fsGroup: 2000
        runAsNonRoot: true
      containers:
        - name: stalwart
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          # Image entrypoint runs: stalwart --config /etc/stalwart/config.json.
          # The binary carries cap_net_bind_service (setcap in the image), so
          # uid 2000 binds the low mail ports without extra capabilities.
          env:
            # Standing fallback admin ("user:password"), independent of the
            # directory state — the provisioning job authenticates with it.
            - name: STALWART_RECOVERY_ADMIN
              valueFrom:
                secretKeyRef:
                  name: stalwart-secrets
                  key: STALWART_RECOVERY_ADMIN
            # Published OAuth/JMAP discovery URLs (TLS terminates at Traefik).
            - name: STALWART_PUBLIC_URL
              value: "https://{{ .Values.host }}"
            # Data-store password, referenced from config.json by name.
            # CNPG generates and owns this secret.
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: stalwart-pg-app
                  key: password
          ports:
            # hostPort binds the mail ports on the VPS's public IP (Cilium KPR
            # implements hostPort) and preserves the client source IP.
            {{- range .Values.mailPorts }}
            - name: {{ .name }}
              containerPort: {{ .port }}
              hostPort: {{ .port }}
            {{- end }}
            # HTTP: JMAP + autoconfig + web-admin + management API + metrics.
            # Cluster-internal only; Traefik/tailnet route into it.
            - name: http
              containerPort: 8080
          livenessProbe:
            httpGet:
              path: /healthz/live
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthz/ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /etc/stalwart/config.json
              subPath: config.json
              readOnly: true
            - name: tls
              mountPath: /etc/stalwart/tls
              readOnly: true
            - name: data
              mountPath: /var/lib/stalwart
      volumes:
        - name: config
          configMap:
            name: stalwart-config
        - name: tls
          secret:
            secretName: {{ .Values.tls.secretName }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: {{ .Values.storage.storageClassName }}
        resources:
          requests:
            storage: {{ .Values.storage.size }}
