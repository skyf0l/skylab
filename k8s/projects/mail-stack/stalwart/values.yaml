# Stalwart mail server (SMTP + IMAP + JMAP). Public mail host is
# mail.<global.domain>; MX for every served domain points at it, so private
# domains never need their own A record or certificate (no CT-log leaks).
#
# v0.16 model: the local config file only holds the RocksDB datastore location.
# Domains, DKIM keys, accounts and TLS certificate objects live in the server's
# database and are reconciled from THIS values file by the provisioning hook
# job (files/provision.sh) — that is the GitOps-as-code surface. Anything else
# changed in the web-admin is runtime state, not git.
image:
  repository: stalwartlabs/stalwart
  tag: v0.16.14
  pullPolicy: IfNotPresent

# Injected by the ApplicationSet from the cluster's global.domain:
#   global.domain -> bare domain (default account/alias domain)
#   host          -> mail.<domain>: MX target, SMTP hostname, cert CN
global:
  domain: ""
host: ""

# Public IP of the node that receives mail — the A record target for `host`.
# Cluster-specific: set in values/<cluster>.yaml.
publicIp: ""

# Mail listeners exposed directly on the node via hostPort (no Traefik in the
# mail path — source IP must survive for SPF/DNSBL checks). The pod lands on
# the VPS because it does NOT tolerate the Pi's light taint and its local-path
# PVC pins it there. Plaintext IMAP (143) and POP3 are deliberately absent.
mailPorts:
  - name: smtp
    port: 25
  - name: submissions
    port: 465
  - name: submission
    port: 587
  - name: imaps
    port: 993

# Scratch volume only. With Postgres as the data store (and blobs living inside
# it), /var/lib/stalwart holds no mail — just temp files. It still pins the pod
# to the VPS, which is what the hostPort listeners need.
storage:
  size: 2Gi
  storageClassName: local-path

# CloudNativePG-managed Postgres: the data store AND, via the blob store's
# "Default" variant, the message bodies themselves. Chosen over the embedded
# RocksDB because Stalwart's own docs say the export/import tool "is not a
# substitute for proper backup procedures" and to rely on the backend's native
# tooling — RocksDB on a single local-path PV has none, while CNPG brings
# barman/PITR + the PodMonitor and dashboard 20417.
#
# Blobs stay in the database on purpose: one backup and one point-in-time
# restore then cover metadata AND message bodies consistently. Split them to an
# S3/R2 blob store only once volume justifies it (a restore then has to
# reconcile DB state against a bucket that moved on independently).
#
# Credentials come from CNPG's generated stalwart-pg-app secret, NOT Vault
# dynamic creds: Stalwart reads the password once at startup, so a rotating
# credential would mean restarting the mail server on a schedule.
postgres:
  instances: 1 # single node for now; bump once a second node joins (HA-ready)
  database: stalwart
  owner: stalwart # also the login user; CNPG generates its password
  # imageName: "" # optional pin; CNPG default is a recent PostgreSQL
  storage:
    size: 20Gi
    storageClass: local-path
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 1Gi

# Barman continuous WAL archiving + scheduled base backups to Cloudflare R2 —
# this is the whole reason for CNPG, so turn it on as soon as the bucket exists.
# DISABLED by default because a Cluster pointed at a non-existent bucket fails
# WAL archiving, which eventually wedges the primary (defectdojo learned this).
# To enable: create the R2 bucket, set destinationPath/endpointURL in
# values/<cluster>.yaml, then flip enabled: true.
backup:
  enabled: false
  retentionPolicy: "30d"
  scheduleCron: "0 0 3 * * *" # CNPG 6-field cron (sec min hour ...) — 03:00 daily
  destinationPath: "" # s3://<bucket>/<path>, per-cluster
  endpointURL: "" # https://<account>.r2.cloudflarestorage.com, per-cluster
  # R2 S3 credentials minted by Vault's cloudflare engine (r2-stalwart-backup
  # role) and leased by the ESO generator — same model as external-dns, no KV.
  serviceAccount: stalwart-backup
  vaultServer: "http://vault.vault.svc:8200"
  vaultAuthMount: kubernetes
  vaultRole: stalwart-backup
  credsPath: "cloudflare/creds/r2-stalwart-backup"
  refreshInterval: 8h

tls:
  # Staging first to avoid rate limits; switched to prod once the cert issued
  # cleanly — mail clients and TLS-verifying senders reject a staging chain.
  clusterIssuer: letsencrypt-prod
  secretName: stalwart-tls
  # Extra SANs on the mail certificate (tpl'd). Keep public+private domains on
  # separate certs — SANs end up in Certificate-Transparency logs.
  extraDnsNames: []

# Public HTTPS surface, deliberately path-scoped: JMAP + discovery only. The
# web-admin and management API are NOT routed here — they are tailnet-only via
# headscale-proxy (stalwart.tail.<domain> -> :8080).
ingress:
  enabled: true
  className: traefik

# autoconfig.<domain>/autodiscover.<domain> hosts (Thunderbird/Outlook client
# discovery): CNAMEs, cert SANs and ingress rules.
autodiscovery: true

# ESO pulls this from Vault at: kvv2/cluster/skylab/apps/stalwart
# The ONLY field to populate:
#   admin_password   PLAINTEXT admin password (feeds STALWART_RECOVERY_ADMIN and
#                    the provisioning job's Basic auth — a hash cannot
#                    authenticate a client)
# Mailbox passwords are deliberately NOT here: accounts are provisioned without
# credentials and their passwords are set once from the web-admin. Personal
# passwords rotate independently and shouldn't be declarative state.
externalSecret:
  enabled: true
  storeName: vault-backend
  vaultKey: cluster/skylab/apps/stalwart

# Special-use folders created (and subscribed) for new mailboxes. Stalwart ships
# with defaultFolders UNSET, so a fresh account only gets Inbox and Drafts —
# Apple Mail and most clients expect Sent/Trash/Junk/Archive to exist server-side
# and misbehave without them (no Sent copies, deletes with nowhere to go).
# Keys are Stalwart's special-use names; values are the folder names clients see.
defaultFolders:
  inbox: Inbox
  drafts: Drafts
  sent: Sent
  trash: Trash
  junk: Junk
  archive: Archive

dns:
  ttl: 300
  # MUST stay 0. external-dns's Cloudflare provider reads back EVERY MX record's
  # priority as 0 (Cloudflare deprecated the top-level priority field), so any
  # other value never matches the desired state and the record is deleted and
  # recreated on every single reconcile — a ~1s window with no MX each time.
  # Priority is meaningless here anyway: one mail host, no fallback.
  mxPriority: 0
  # Defaults for every served domain; override per domain with spf:/dmarc:.
  # DMARC default is per-domain (rua=postmaster@<domain>) — cross-domain rua
  # would need an external-reporting authorization record.
  spf: "v=spf1 mx -all"
  # RFC 6186/8314 SRV client-discovery records. Off until SRV support of the
  # external-dns Cloudflare provider is verified on this setup.
  srvRecords: false

# ---- served domains (public). skylab-private appends to extraDomains. ----
# Fields: name (tpl'd), mx (CUTOVER GATE: false = DKIM/DMARC only, true = also
# publish MX+SPF, i.e. this server receives the domain's mail), optional
# spf/dmarc overrides, optional catchAll (full address).
# skyf0l.dev stays mx:false until Cloudflare Email Routing is retired — flip is
# a one-line commit.
domains:
  # Cloudflare Email Routing must be disabled on the zone before mx: true can
  # take effect: its MX/SPF records are unowned (and API-locked), so external-dns
  # skips them and never replaces them while Routing is on.
  #
  # Optional per-domain `mailHost:` gives a domain its own MX target, A record
  # and separate certificate instead of the shared host — see _helpers.tpl.
  - name: "{{ .Values.global.domain }}"
    mx: true
extraDomains: []

# ---- accounts (ensure-only: never pruned, credentials never touched). ----
# Declares WHICH mailboxes and aliases exist, not their passwords: each account
# is created without credentials, then given a password from the web-admin.
# name = local part, domain defaults to global.domain, aliases are local parts
# on the same domain.
# Every mx:true domain should have a postmaster alias (DMARC rua target).
accounts:
  - name: skyf0l
    aliases: [postmaster, admin, contact]
extraAccounts: []

provision:
  enabled: true
  # Needs sh + kubectl (curl/jq are apk-added at runtime, same pragmatism as
  # the headscale-proxy authkey-mint job).
  jobImage: alpine/kubectl:1.36.2
  adminUser: admin

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    memory: 1536Mi
