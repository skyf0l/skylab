vault:
  # Agent Injector disabled: it's the sidecar-injection alternative to ESO, and we
  # deliver every secret via External Secrets Operator (+ the VaultDynamicSecret
  # generator). Nothing carries vault.hashicorp.com/agent-inject annotations, so the
  # injector only ran an idle Deployment + a cluster-wide pod mutating webhook.
  injector:
    enabled: false

  server:
    standalone:
      enabled: false

    auditStorage:
      enabled: true

    ha:
      enabled: true
      replicas: 3
      raft:
        enabled: true
        # Overriding config REPLACES the chart default wholesale, so this is the
        # chart's default raft config + Prometheus telemetry: unauthenticated
        # metrics on the listener (so the ServiceMonitor scrapes without a token)
        # and a 24h-retention telemetry stanza. listener/storage/service_registration
        # are byte-for-byte the chart default — only telemetry is added.
        config: |
          ui = true

          plugin_directory = "/vault/plugins"

          listener "tcp" {
            tls_disable = 1
            address = "[::]:8200"
            cluster_address = "[::]:8201"
            telemetry {
              unauthenticated_metrics_access = "true"
            }
          }

          storage "raft" {
            path = "/vault/data"
          }

          service_registration "kubernetes" {}

          telemetry {
            prometheus_retention_time = "24h"
            disable_hostname = true
          }

    # Deliver the Cloudflare secrets-engine plugin into the server pods. The
    # initContainer downloads a pinned, checksum-verified release binary into a
    # shared emptyDir that Vault reads via plugin_directory (set in the raft
    # config above). It re-runs on every pod start, so the binary is versioned
    # and declarative, no kubectl cp, no baked image. Bump PLUGIN_VERSION here
    # AND cloudflare_plugin_version/sha256 in vault/terraform/cloudflare.tf
    # together, then restart+unseal to load the new version.
    volumes:
      - name: plugins
        emptyDir: {}
    volumeMounts:
      - name: plugins
        mountPath: /vault/plugins
    extraInitContainers:
      - name: fetch-cloudflare-plugin
        image: curlimages/curl:8.21.0
        env:
          - name: PLUGIN_VERSION
            value: "1.2.0"
        command: ["/bin/sh", "-c"]
        args:
          - |
            set -eu
            cd /plugins
            base="https://github.com/skyf0l/vault-cloudflare-secret-engine/releases/download/v${PLUGIN_VERSION}"
            fn="vault-cloudflare-secret-engine_${PLUGIN_VERSION}_linux_amd64"
            curl -fsSLO "${base}/${fn}"
            curl -fsSLO "${base}/checksums.txt"
            grep " ${fn}$" checksums.txt | sha256sum -c -
            install -m 0755 "${fn}" /plugins/vault-cloudflare-secret-engine
            rm -f "${fn}" checksums.txt
        volumeMounts:
          - name: plugins
            mountPath: /plugins

    ingress:
      enabled: true

  ui:
    enabled: true

  # Prometheus Operator ServiceMonitor scraping /v1/sys/metrics?format=prometheus.
  # Top-level (sibling of server). Paired with the unauthenticated_metrics_access
  # telemetry in server.ha.raft.config above.
  serverTelemetry:
    serviceMonitor:
      enabled: true
