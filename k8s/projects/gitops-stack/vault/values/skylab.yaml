vault:
  server:
    dataStorage:
      storageClass: local-path

    auditStorage:
      storageClass: local-path

    # Single-node VPS for now; raise once more heavy nodes exist.
    ha:
      replicas: 1

    # NOT publicly exposed. Vault is reached in-cluster (vault.vault.svc:8200 for
    # ESO/apps) and by admins via `kubectl port-forward` / the tailnet.
    ingress:
      enabled: false
