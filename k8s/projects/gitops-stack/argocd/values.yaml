argo-cd:
  # Prometheus metrics + ServiceMonitors for the ArgoCD dashboard.
  # Scraped automatically (Prometheus selects all ServiceMonitors).
  controller:
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
  server:
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
  repoServer:
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
  applicationSet:
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true

  configs:
    cm:
      # External URL (also the OIDC issuer's redirect base). ArgoCD is tailnet-only.
      url: https://argocd.tail.skyf0l.dev
      # SSO via Keycloak. clientSecret resolves from the argocd-oidc secret (ESO/Vault).
      # `groups` claim drives RBAC (below). Local admin stays as break-glass.
      oidc.config: |
        name: Keycloak
        issuer: https://keycloak.skyf0l.dev/realms/skylab
        clientID: argocd
        clientSecret: $argocd-oidc:clientSecret
        requestedScopes: ["openid", "profile", "email", "groups"]
        requestedIDTokenClaims:
          groups:
            essential: true
      # The ExternalSecret CRD defines OpenAPI schema defaults, so the apiserver
      # fills in fields our git manifests omit (target.deletionPolicy=Retain,
      # template.engineVersion=v2, remoteRef.*Strategy/Policy, ...). That makes
      # live != desired and every ExternalSecret sits OutOfSync forever (Healthy,
      # but noisy). Ignore those server-defaulted fields cluster-wide so loki,
      # thanos, and any future ExternalSecret reconcile clean. RespectIgnore-
      # Differences=true is already set in every app's syncOptions.
      resource.customizations.ignoreDifferences.external-secrets.io_ExternalSecret: |
        jqPathExpressions:
          - .spec.target.deletionPolicy
          - .spec.target.template.engineVersion
          - .spec.target.template.mergePolicy
          - .spec.data[]?.remoteRef.conversionStrategy
          - .spec.data[]?.remoteRef.decodingStrategy
          - .spec.data[]?.remoteRef.metadataPolicy
          - .spec.data[]?.remoteRef.nullBytePolicy
    # RBAC: members of the Keycloak `argocd-admins` group get full admin. Everyone else
    # falls through to the (read-only) default policy. Local admin user is unaffected.
    rbac:
      scopes: '[groups]'
      policy.csv: |
        g, argocd-admins, role:admin
