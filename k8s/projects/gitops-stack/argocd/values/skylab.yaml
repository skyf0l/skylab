argo-cd:
  # global.domain (argocd.<global.domain>) is injected by the ApplicationSet.

  server:
    # Not publicly exposed. Reached on the tailnet via argocd.tail.<domain>
    # (Traefik IngressRoute in the tail-ingress chart).
    ingress:
      enabled: false

  configs:
    cm:
      # Poll git every 60s instead of the 3-min default, so a push syncs within
      # ~1 min. ArgoCD is tailnet-only, so a GitHub webhook can't reach it for
      # true push-triggered (instant) sync — this is the no-exposure alternative.
      timeout.reconciliation: 60s
    params:
      # Traefik terminates TLS in front of ArgoCD.
      server.insecure: true
    # Admin login uses the auto-generated `argocd-initial-admin-secret` for now:
    #   kubectl -n argocd get secret argocd-initial-admin-secret \
    #     -o jsonpath="{.data.password}" | base64 -d
    # Phase 3 (External Secrets Operator) will populate `argocd-secret` from Vault
    # instead of committing a bcrypt hash here.
