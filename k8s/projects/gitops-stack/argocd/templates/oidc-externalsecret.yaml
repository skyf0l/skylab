# ArgoCD OIDC client secret from Vault. ArgoCD's oidc.config resolves
# `clientSecret: $argocd-oidc:clientSecret` against a secret named argocd-oidc that
# carries the app.kubernetes.io/part-of: argocd label — so the secret never lives in the
# repo. Same Vault value the keycloak config-cli Job substitutes into the argocd client.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: argocd-oidc
  labels:
    app.kubernetes.io/part-of: argocd
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: argocd-oidc
    creationPolicy: Owner
    template:
      metadata:
        labels:
          app.kubernetes.io/part-of: argocd
  data:
    - secretKey: clientSecret
      remoteRef:
        key: cluster/skylab/apps/argocd
        property: oidc_client_secret
