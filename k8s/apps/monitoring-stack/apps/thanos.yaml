apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: thanos
  annotations:
    # After kube-prometheus (default wave 0): Thanos Query/Store depend on the
    # sidecar discovery service and the thanos-objstore Secret (via ESO).
    argocd.argoproj.io/sync-wave: "1"
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - matrix:
        generators:
          # Auto updated by parent ApplicationSet
          - list:
              elements:
                - name: skylab
          - git:
              repoURL: https://github.com/skyf0l/skylab.git
              revision: main
              files:
                - path: clusters/{{.name }}/config.json
  template:
    metadata:
      name: "{{.name}}-thanos"
      labels:
        app.kubernetes.io/part-of: monitoring-stack
        skylab.dev/tier: observability
      annotations:
        argocd.argoproj.io/sync-wave: "1"
    spec:
      project: observability
      source:
        repoURL: "{{.repo.url}}"
        targetRevision: "{{.repo.revision}}"
        path: k8s/projects/monitoring-stack/thanos
        helm:
          releaseName: thanos
          valueFiles:
            - values.yaml
            - values/{{.name}}.yaml
      destination:
        server: https://kubernetes.default.svc
        namespace: monitoring
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - Validate=true
          - PrunePropagationPolicy=foreground
          - PruneLast=true
          - RespectIgnoreDifferences=true
          - ServerSideApply=true # Avoids annotation size limits
        retry:
          limit: 5
