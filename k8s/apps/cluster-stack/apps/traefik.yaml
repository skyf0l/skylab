apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: traefik
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - matrix:
        generators:
          # Auto updated by parent ApplicationSet
          - list:
              elements:
                - name: skylab
          - git:
              repoURL: https://github.com/skyf0l/skylab.git
              revision: main
              files:
                - path: clusters/{{.name }}/config.json
  template:
    metadata:
      name: "{{.name}}-traefik"
    spec:
      project: default
      source:
        repoURL: "{{.repo.url}}"
        targetRevision: "{{.repo.revision}}"
        path: k8s/projects/cluster-stack/traefik
        helm:
          releaseName: traefik
          valueFiles:
            - values.yaml
            - values/{{.name}}.yaml
          # Dashboard host derived from the cluster's global.domain.
          parameters:
            - name: "traefik.ingressRoute.dashboard.matchRule"
              value: "Host(`traefik.{{.global.domain}}`) && (PathPrefix(`/dashboard`) || PathPrefix(`/api`))"
      destination:
        server: https://kubernetes.default.svc
        namespace: traefik
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - Validate=true
          - PrunePropagationPolicy=foreground
          - PruneLast=true
          - RespectIgnoreDifferences=true
          - ServerSideApply=true
        retry:
          limit: 5
