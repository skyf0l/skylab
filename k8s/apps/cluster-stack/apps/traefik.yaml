apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: traefik
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - matrix:
        generators:
          # Auto updated by parent ApplicationSet
          - list:
              elements:
                - name: skylab
          - git:
              repoURL: https://github.com/skyf0l/skylab.git
              revision: main
              files:
                - path: clusters/{{.name }}/config.json
  template:
    metadata:
      name: "{{.name}}-traefik"
      labels:
        app.kubernetes.io/part-of: cluster-stack
        skylab.dev/tier: platform
    spec:
      project: platform
      source:
        repoURL: "{{.repo.url}}"
        targetRevision: "{{.repo.revision}}"
        path: k8s/projects/cluster-stack/traefik
        helm:
          releaseName: traefik
          valueFiles:
            - values.yaml
            - values/{{.name}}.yaml
          parameters:
            # Traefik runs as a hostPort DaemonSet behind a ClusterIP Service, so the
            # chart's default publishedService has no LoadBalancer status to copy and
            # every Ingress stays addressless -> Argo reports it Progressing forever,
            # which also blocks PruneLast cleanups. Stamp a static hostname onto every
            # Ingress .status instead (see additionalArguments in values/skylab.yaml).
            - name: "traefik.additionalArguments[0]"
              value: "--providers.kubernetesingress.ingressendpoint.hostname={{.global.domain}}"
      destination:
        server: https://kubernetes.default.svc
        namespace: traefik
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - Validate=true
          - PrunePropagationPolicy=foreground
          - PruneLast=true
          - RespectIgnoreDifferences=true
          - ServerSideApply=true
        retry:
          limit: 5
