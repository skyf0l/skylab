apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: cluster-bootstrap
  annotations:
    # Foundational (storage class + kube-dns alias) — adopt early, before apps that
    # rely on PVCs / the kube-dns name.
    argocd.argoproj.io/sync-wave: "-1"
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - matrix:
        generators:
          # Auto updated by parent ApplicationSet
          - list:
              elements:
                - name: skylab
          - git:
              repoURL: https://github.com/skyf0l/skylab.git
              revision: main
              files:
                - path: clusters/{{.name }}/config.json
  template:
    metadata:
      name: "{{.name}}-cluster-bootstrap"
      labels:
        app.kubernetes.io/part-of: cluster-stack
        skylab.dev/tier: platform
      annotations:
        argocd.argoproj.io/sync-wave: "-1"
    spec:
      project: platform
      # Plain manifests (kustomize) — local-path-provisioner + kube-dns alias.
      # ansible applies these same files at cluster-init; ArgoCD adopts them here.
      source:
        repoURL: "{{.repo.url}}"
        targetRevision: "{{.repo.revision}}"
        path: k8s/projects/cluster-stack/cluster-bootstrap
      destination:
        server: https://kubernetes.default.svc
        namespace: kube-system
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - Validate=true
          - PrunePropagationPolicy=foreground
          - PruneLast=true
          - RespectIgnoreDifferences=true
          - ServerSideApply=true # adopts the ansible-applied resources cleanly
        retry:
          limit: 5
