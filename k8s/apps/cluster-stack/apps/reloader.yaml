apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: reloader
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - matrix:
        generators:
          # Auto updated by parent ApplicationSet
          - list:
              elements:
                - name: skylab
          - git:
              repoURL: https://github.com/skyf0l/skylab.git
              revision: main
              files:
                - path: clusters/{{.name }}/config.json
  template:
    metadata:
      name: "{{.name}}-reloader"
    spec:
      project: default
      source:
        repoURL: "{{.repo.url}}"
        targetRevision: "{{.repo.revision}}"
        path: k8s/projects/cluster-stack/reloader
        helm:
          releaseName: reloader
          valueFiles:
            - values.yaml
          # ServiceMonitor is gated on the Prometheus-operator CRD, which the repo-server
          # can't discover offline — declare it so the ServiceMonitor renders.
          apiVersions:
            - monitoring.coreos.com/v1
      destination:
        server: https://kubernetes.default.svc
        namespace: reloader
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - Validate=true
          - PrunePropagationPolicy=foreground
          - PruneLast=true
          - RespectIgnoreDifferences=true
          - ServerSideApply=true
        retry:
          limit: 5
