apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: vpa
  annotations:
    # Before Goldilocks (which creates VPA CRs) so the VPA CRDs exist first.
    argocd.argoproj.io/sync-wave: "1"
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - matrix:
        generators:
          # Auto updated by parent ApplicationSet
          - list:
              elements:
                - name: skylab
          - git:
              repoURL: https://github.com/skyf0l/skylab.git
              revision: main
              files:
                - path: clusters/{{.name }}/config.json
  template:
    metadata:
      name: "{{.name}}-vpa"
      annotations:
        argocd.argoproj.io/sync-wave: "1"
    spec:
      project: observability
      source:
        repoURL: "{{.repo.url}}"
        targetRevision: "{{.repo.revision}}"
        path: k8s/projects/finops-stack/vpa
        helm:
          releaseName: vpa
          valueFiles:
            - values.yaml
      destination:
        server: https://kubernetes.default.svc
        namespace: vpa
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - Validate=true
          - PrunePropagationPolicy=foreground
          - PruneLast=true
          - RespectIgnoreDifferences=true
          - ServerSideApply=true # VPA CRDs are large -> avoid last-applied annotation limit
        retry:
          limit: 5
