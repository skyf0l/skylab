apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: headscale-exit
  annotations:
    # After Headscale is up (the exit node registers against the in-cluster control server).
    argocd.argoproj.io/sync-wave: "2"
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - matrix:
        generators:
          # Auto updated by parent ApplicationSet
          - list:
              elements:
                - name: skylab
          - git:
              repoURL: https://github.com/skyf0l/skylab.git
              revision: main
              files:
                - path: clusters/{{.name }}/config.json
  template:
    metadata:
      name: "{{.name}}-headscale-exit"
      annotations:
        argocd.argoproj.io/sync-wave: "2"
    spec:
      project: default
      source:
        repoURL: "{{.repo.url}}"
        targetRevision: "{{.repo.revision}}"
        path: k8s/projects/security-stack/headscale-exit
        helm:
          releaseName: headscale-exit
          valueFiles:
            - values.yaml
          # Key-minting user derived from global.domain.
          parameters:
            - name: "authkeyMint.user"
              value: "infra@{{.global.domain}}"
            # Tailscale forces a TLS :443 dial for the persistent noise/map session,
            # so the in-cluster http svc (80/50443, no 443) lets the node register
            # but then fails to hold the session and crash-loops on restart. The
            # public HTTPS URL is the only endpoint that satisfies it.
            - name: "loginServer"
              value: "https://headscale.{{.global.domain}}"
      destination:
        server: https://kubernetes.default.svc
        namespace: tailscale
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - Validate=true
          - PrunePropagationPolicy=foreground
          - PruneLast=true
          - RespectIgnoreDifferences=true
        retry:
          limit: 5
