apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: authelia
  annotations:
    # After cert-manager (TLS), ESO store, and Vault (gitops-stack -2).
    argocd.argoproj.io/sync-wave: "0"
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - matrix:
        generators:
          # Auto updated by parent ApplicationSet
          - list:
              elements:
                - name: skylab
          - git:
              repoURL: https://github.com/skyf0l/skylab.git
              revision: main
              files:
                - path: clusters/{{.name }}/config.json
  template:
    metadata:
      name: "{{.name}}-authelia"
      labels:
        app.kubernetes.io/part-of: security-stack
        skylab.dev/tier: platform
      annotations:
        argocd.argoproj.io/sync-wave: "0"
    spec:
      project: platform
      source:
        repoURL: "{{.repo.url}}"
        targetRevision: "{{.repo.revision}}"
        path: k8s/projects/security-stack/authelia
        helm:
          releaseName: authelia
          valueFiles:
            - values.yaml
            - values/{{.name}}.yaml
          # Domain-derived values from the cluster's global.domain. `global.domain`
          # is fed to the pod as the DOMAIN env var; configuration.yml resolves it
          # via Authelia's {{ env "DOMAIN" }} filter. `host` drives the ingress.
          parameters:
            - name: "global.domain"
              value: "{{.global.domain}}"
            - name: "host"
              value: "auth.{{.global.domain}}"
      destination:
        server: https://kubernetes.default.svc
        namespace: authelia
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - Validate=true
          - PrunePropagationPolicy=foreground
          - PruneLast=true
          - RespectIgnoreDifferences=true
        retry:
          limit: 5
