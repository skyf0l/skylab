apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: headscale
  annotations:
    # After cert-manager (TLS for the public ingress).
    argocd.argoproj.io/sync-wave: "1"
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - matrix:
        generators:
          # Auto updated by parent ApplicationSet
          - list:
              elements:
                - name: skylab
          - git:
              repoURL: https://github.com/skyf0l/skylab.git
              revision: main
              files:
                - path: clusters/{{.name }}/config.json
  template:
    metadata:
      name: "{{.name}}-headscale"
      annotations:
        argocd.argoproj.io/sync-wave: "1"
    spec:
      project: default
      source:
        repoURL: "{{.repo.url}}"
        targetRevision: "{{.repo.revision}}"
        path: k8s/projects/security-stack/headscale
        helm:
          releaseName: headscale
          valueFiles:
            - values.yaml
            - values/{{.name}}.yaml
          # host/users/baseDomain/ACLs all derive from this via the chart's tpl calls.
          parameters:
            - name: "global.domain"
              value: "{{.global.domain}}"
      destination:
        server: https://kubernetes.default.svc
        namespace: headscale
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - Validate=true
          - PrunePropagationPolicy=foreground
          - PruneLast=true
          - RespectIgnoreDifferences=true
        retry:
          limit: 5
