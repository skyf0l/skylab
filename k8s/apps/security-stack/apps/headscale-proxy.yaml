apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: headscale-proxy
  annotations:
    # After Headscale is up (the proxies register against the in-cluster control server).
    argocd.argoproj.io/sync-wave: "2"
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - matrix:
        generators:
          # Auto updated by parent ApplicationSet
          - list:
              elements:
                - name: skylab
          - git:
              repoURL: https://github.com/skyf0l/skylab.git
              revision: main
              files:
                - path: clusters/{{.name }}/config.json
  template:
    metadata:
      name: "{{.name}}-headscale-proxy"
      annotations:
        argocd.argoproj.io/sync-wave: "2"
    spec:
      project: default
      source:
        repoURL: "{{.repo.url}}"
        targetRevision: "{{.repo.revision}}"
        path: k8s/projects/security-stack/headscale-proxy
        helm:
          releaseName: headscale-proxy
          valueFiles:
            - values.yaml
          # Tailnet base domain + key-minting user derived from global.domain.
          parameters:
            - name: "baseDomain"
              value: "tail.{{.global.domain}}"
            - name: "authkeyMint.user"
              value: "infra@{{.global.domain}}"
            # Tailscale requires the control connection over TLS:443; the public
            # headscale URL (what server_url advertises) is the only endpoint that
            # satisfies that. The in-cluster http svc has no 443 and breaks the
            # persistent noise/map dial ("forcing port 443 dial").
            - name: "loginServer"
              value: "https://headscale.{{.global.domain}}"
      destination:
        server: https://kubernetes.default.svc
        namespace: tailscale
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - Validate=true
          - PrunePropagationPolicy=foreground
          - PruneLast=true
          - RespectIgnoreDifferences=true
        retry:
          limit: 5
