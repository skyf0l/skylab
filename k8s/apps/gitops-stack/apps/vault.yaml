apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: vault
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - matrix:
        generators:
          # Auto updated by parent ApplicationSet
          - list:
              elements:
                - name: skylab
          - git:
              repoURL: https://github.com/skyf0l/skylab.git
              revision: main
              files:
                - path: clusters/{{.name }}/config.json
  template:
    metadata:
      name: "{{.name}}-vault"
      annotations:
        argocd.argoproj.io/sync-wave: "-2"
    spec:
      project: default
      source:
        repoURL: "{{.repo.url}}"
        targetRevision: "{{.repo.revision}}"
        path: k8s/projects/gitops-stack/vault
        helm:
          releaseName: vault
          valueFiles:
            - values.yaml
            - values/{{.name}}.yaml
          parameters:
            - name: "vault.server.ingress.hosts[0].host"
              value: "vault.{{.global.domain}}"
            - name: "vault.server.ingress.tls[0].hosts[0]"
              value: "vault.{{.global.domain}}"
      destination:
        server: https://kubernetes.default.svc
        namespace: vault
      # The vault-agent-injector self-patches caBundle into its webhook at runtime;
      # let it own that field so ArgoCD (ServerSideApply) doesn't fight it.
      ignoreDifferences:
        - group: admissionregistration.k8s.io
          kind: MutatingWebhookConfiguration
          name: vault-agent-injector-cfg
          jqPathExpressions:
            - ".webhooks[]?.clientConfig.caBundle"
        # StatefulSet volumeClaimTemplates are immutable AND the API server defaults
        # them (apiVersion/kind, volumeMode: Filesystem, status.phase) which the Vault
        # Helm chart doesn't render — ArgoCD's normalizers don't strip these, so it
        # sits OutOfSync forever despite no real drift. Ignore the templates (can't be
        # changed in place anyway).
        - group: apps
          kind: StatefulSet
          name: vault
          jsonPointers:
            - /spec/volumeClaimTemplates
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - Validate=true
          - PrunePropagationPolicy=foreground
          - PruneLast=true
          - RespectIgnoreDifferences=true
          - ServerSideApply=true # Avoids annotation size limits
        retry:
          limit: 5
