apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: mcp-stack
  annotations:
    # After the security-stack (Authelia/cert-manager/ESO) is up.
    argocd.argoproj.io/sync-wave: "1"
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - matrix:
        generators:
          # Auto updated by parent ApplicationSet
          - list:
              elements:
                - name: skylab
          - git:
              repoURL: https://github.com/skyf0l/skylab.git
              revision: main
              files:
                - path: clusters/{{.name}}/config.json
  template:
    metadata:
      name: "{{.name}}-mcp-stack"
      labels:
        app.kubernetes.io/part-of: mcp-stack
        skylab.dev/tier: platform
    spec:
      project: platform
      source:
        repoURL: "{{.repo.url}}"
        targetRevision: "{{.repo.revision}}"
        path: k8s/apps/mcp-stack
        kustomize:
          namePrefix: "{{.name}}-"
          patches:
            - target:
                kind: ApplicationSet
              patch: |-
                - op: replace
                  path: /spec/generators/0/matrix/generators/0/list/elements/0/name
                  value: {{.name}}
                - op: replace
                  path: /spec/generators/0/matrix/generators/1/git/repoURL
                  value: {{.repo.url}}
                - op: replace
                  path: /spec/generators/0/matrix/generators/1/git/revision
                  value: {{.repo.revision}}
      destination:
        server: https://kubernetes.default.svc
        namespace: argocd
      syncPolicy:
        automated:
          prune: true
        syncOptions:
          - Validate=true
          - PrunePropagationPolicy=foreground
          - PruneLast=true
          - RespectIgnoreDifferences=true
        retry:
          limit: 5
