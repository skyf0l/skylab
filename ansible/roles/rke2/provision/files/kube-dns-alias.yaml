# RKE2 names its CoreDNS Service "rke2-coredns-rke2-coredns", but many upstream
# charts (e.g. the Loki gateway nginx) hardcode "kube-dns.kube-system.svc" as the
# DNS resolver. Without this alias they fail to start ("host not found in
# resolver"). This Service shares the CoreDNS pod selector (k8s-app: kube-dns), so
# it gets real endpoints and behaves as a standard kube-dns Service for any chart
# that expects it. Its ClusterIP differs from the resolv.conf one (10.43.0.10,
# owned by rke2-coredns) — that's fine, charts resolve it by name.
apiVersion: v1
kind: Service
metadata:
  name: kube-dns
  namespace: kube-system
  labels:
    k8s-app: kube-dns
    kubernetes.io/cluster-service: "true"
    kubernetes.io/name: CoreDNS
spec:
  selector:
    k8s-app: kube-dns
  ports:
    - name: dns
      port: 53
      protocol: UDP
      targetPort: 53
    - name: dns-tcp
      port: 53
      protocol: TCP
      targetPort: 53
