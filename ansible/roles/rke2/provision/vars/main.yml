# Note: variables defined here will be passed to lablabs.rke2 role
rke2_api_ip: "{{ hostvars[groups['masters'][0]]['ansible_host'] }}"

# Extra SANs on the apiserver serving cert, so kubectl can reach the API by these
# names and still validate TLS. `apiserver.tail.<domain>` is the tailnet endpoint
# exposed by the headscale-proxy 'apiserver' passthrough node.
rke2_additional_sans:
  - "apiserver.tail.{{ domain_name }}"

# We use cilium as CNI, so we disable kube-proxy
disable_kube_proxy: true
rke2_disable:
  - rke2-canal
  - rke2-ingress-nginx
# Cilium not available at install time, it will be installed later
rke2_cni: none

# Free-form server config.yaml options (lablabs.rke2 appends these for servers).
# etcd-expose-metrics: bind etcd's /metrics to 0.0.0.0:2381 instead of the default
# 127.0.0.1, so kube-prometheus's kube-etcd ServiceMonitor (scraping <nodeIP>:2381)
# can reach it — otherwise the etcd dashboard shows no data (target = connection
# refused). NB: 2381 is the unauthenticated metrics port; it's only reachable on
# the cluster's private network (no public/tailnet exposure here).
rke2_server_options:
  - etcd-expose-metrics: true
