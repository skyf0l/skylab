# Bootstrap prerequisites for the Vault configure + seed step (which runs LAST).
# Checked up-front so a missing CLI/secret fails fast, before the long cluster work.
- name: Check bootstrap prerequisites (CLIs + R2 state creds)
  ansible.builtin.assert:
    that:
      - lookup('ansible.builtin.pipe', 'command -v terraform || true') | length > 0
      - lookup('ansible.builtin.pipe', 'command -v vault || true') | length > 0
      - lookup('ansible.builtin.pipe', 'command -v openssl || true') | length > 0
      - r2_access_key_id | default('') | length > 0
      - r2_secret_access_key | default('') | length > 0
      - cf_api_token | default('') | length > 0
    fail_msg: >-
      Bootstrap prerequisites missing. Need these CLIs on PATH: terraform, vault,
      openssl; and in secrets.local.yml: r2_access_key_id / r2_secret_access_key
      (Cloudflare R2 token for the Terraform state backend) + cf_api_token
      (Cloudflare DNS API token for cert-manager DNS-01).
    quiet: true

# Save a kubeconfig under artifacts/ (gitignored) pointed at the tailnet API
# endpoint. Done FIRST (no dependencies) so it always lands, regardless of any
# later step. Usable once the headscale-proxy 'apiserver' node is up and you're
# on the tailnet; `export KUBECONFIG=ansible/artifacts/<cluster>/<cluster>.kubeconfig`.
- name: Ensure cluster artifacts dir exists
  ansible.builtin.file:
    path: "{{ gitops_install_workdir }}/{{ gitops_install_cluster_name }}"
    state: directory
    mode: "0700"

- name: Copy the kubeconfig into artifacts
  ansible.builtin.copy:
    src: "{{ gitops_install_kubeconfig_local_path | regex_replace('^~', ansible_env.HOME) }}"
    dest: "{{ gitops_install_workdir }}/{{ gitops_install_cluster_name }}/{{ gitops_install_cluster_name }}.kubeconfig"
    remote_src: true
    mode: "0600"

- name: Point the artifacts kubeconfig at the tailnet API endpoint
  ansible.builtin.replace:
    path: "{{ gitops_install_workdir }}/{{ gitops_install_cluster_name }}/{{ gitops_install_cluster_name }}.kubeconfig"
    regexp: '^(\s*server:\s*)https://\S+'
    replace: '\1https://apiserver.tail.{{ domain_name }}:6443'

- name: Install ArgoCD
  ansible.builtin.include_tasks: argocd.yml

- name: Install Vault
  ansible.builtin.include_tasks: vault.yml

# ArgoCD is the source of truth from here on: apply the root ApplicationSet,
# which reads clusters/{{ cluster_name }}/config.json (pointing at GitHub) and
# fans out every stack. Replaces the old in-cluster Gitea push (sync.sh).
# Applied BEFORE the Vault config below so a Terraform/seed failure can never
# block the GitOps handoff.
- name: Bootstrap ArgoCD root ApplicationSet (GitHub source of truth)
  kubernetes.core.k8s:
    kubeconfig: "{{ kubeconfig_local_path }}"
    namespace: argocd
    state: present
    src: "{{ repo_root }}/clusters/{{ cluster_name }}/application.yml"

# cert-manager solves DNS-01 with a Cloudflare API token. It's a bootstrap secret
# (not GitOps-managed, kept out of git), created here from secrets.local.yml so
# certs issue without a manual `kubectl create secret`. Created early so it's
# present before cert-manager-issuers + the Certificates sync. ArgoCD adopts the
# namespace; the secret is referenced by name from cert-manager-issuers.
- name: Ensure cert-manager namespace exists
  kubernetes.core.k8s:
    kubeconfig: "{{ kubeconfig_local_path }}"
    state: present
    definition:
      apiVersion: v1
      kind: Namespace
      metadata:
        name: cert-manager

- name: Create the Cloudflare DNS-01 API token secret
  kubernetes.core.k8s:
    kubeconfig: "{{ kubeconfig_local_path }}"
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: cloudflare-api-token
        namespace: cert-manager
      type: Opaque
      stringData:
        api-token: "{{ cf_api_token }}"
  no_log: true

# Mint a 24h single-use Headscale pre-auth key for the personal user and drop a
# ready `tailscale up` join script in artifacts/. Headscale is ArgoCD-synced, so
# it comes up AFTER the handoff — wait for it best-effort; if it isn't ready in
# time, skip with a note (re-run `make bootstrap` to retry just this).
# Headscale 0.28 quirks (mirrored from headscale-proxy/authkey-mint-job): JSON is
# tab-indented, `preauthkeys create` needs the numeric user id, and the key is
# grepped from the output.
- name: Wait for headscale + the skypwn user (ArgoCD-synced)
  ansible.builtin.shell: >-
    kubectl -n headscale exec headscale-0 -c headscale -- headscale users list -o json 2>/dev/null
    | tr -d ' \t\n' | grep -q '"name":"skypwn@{{ domain_name }}"'
  args:
    executable: /bin/bash
  environment:
    KUBECONFIG: "{{ kubeconfig_local_path | regex_replace('^~', ansible_env.HOME) }}"
  register: gitops_install_hs_ready
  changed_when: false
  failed_when: false
  retries: 30
  delay: 20
  until: gitops_install_hs_ready.rc == 0

- name: Mint the tailnet key + write the join script
  when: gitops_install_hs_ready.rc == 0
  environment:
    KUBECONFIG: "{{ kubeconfig_local_path | regex_replace('^~', ansible_env.HOME) }}"
  block:
    - name: Mint a 24h single-use pre-auth key for skypwn
      ansible.builtin.shell: |
        set -euo pipefail
        hs() { kubectl -n headscale exec headscale-0 -c headscale -- headscale "$@"; }
        uid=$(hs users list -o json 2>/dev/null | tr -d ' \t\n' \
          | grep -oE '\{"id":"?[0-9]+"?,"name":"skypwn@{{ domain_name }}"' | grep -oE '[0-9]+' | head -1)
        [ -n "${uid:-}" ] || { echo "skypwn user not found" >&2; exit 1; }
        hs preauthkeys create --user "$uid" --expiration 24h 2>&1 \
          | grep -oE '[a-z]+key-[A-Za-z0-9_.-]+|[a-f0-9]{48,}' | head -1
      args:
        executable: /bin/bash
      register: gitops_install_hs_key
      changed_when: true

    - name: Write the tailnet join script to artifacts
      ansible.builtin.copy:
        dest: "{{ gitops_install_workdir }}/{{ gitops_install_cluster_name }}/tailscale-join.sh"
        mode: "0700"
        content: |
          #!/usr/bin/env bash
          # One-time tailnet join for THIS machine (headscale user skypwn@{{ domain_name }}).
          # Single-use pre-auth key, 24h TTL. Re-run `make bootstrap` to mint a fresh one.
          #
          # Manual fallback (interactive — needs `headscale nodes register` on the server):
          #   sudo tailscale login --login-server=https://headscale.{{ domain_name }}
          #   sudo tailscale up --accept-dns --accept-routes --login-server=https://headscale.{{ domain_name }}
          sudo tailscale up \
            --login-server=https://headscale.{{ domain_name }} \
            --authkey {{ gitops_install_hs_key.stdout | trim }} \
            --accept-dns --accept-routes

- name: Note when the tailnet key was skipped (headscale not ready in time)
  when: gitops_install_hs_ready.rc != 0
  ansible.builtin.debug:
    msg: >-
      headscale wasn't ready in time, so artifacts/{{ cluster_name }}/tailscale-join.sh
      was not generated. Re-run `make bootstrap` once headscale has synced.

# Apply the Vault Terraform (mounts/auth/policies/roles) + seed bootstrap secrets,
# in-cluster via a port-forward (no public ingress / tailnet needed). LAST, so any
# failure here leaves ArgoCD running + the artifacts already written.
- name: Configure + seed Vault
  ansible.builtin.include_tasks: vault_configure.yml
