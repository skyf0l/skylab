# Skylab cluster: a rented VPS as the control-plane / heavy node, and the home
# Raspberry Pi 5 joined as a light worker over a WireGuard tunnel.
#
# Fill in the placeholders below once the VPS is rented and WireGuard is up:
#   <VPS_PUBLIC_IP>  - the VPS public IP (used for SSH + RKE2 API join)
#   <PI_WG_IP>       - the Pi's WireGuard address (used for SSH; also advertised
#                      as the node-ip in group_vars/workers.yml)
#   <SSH_USER>       - the SSH user with sudo on both hosts

[masters]
vps ansible_host=<VPS_PUBLIC_IP>

[workers]
rpi5 ansible_host=<PI_WG_IP>

[k8s_cluster:children]
masters
workers

[all:vars]
ansible_user=<SSH_USER>
ansible_ssh_private_key_file=~/.ssh/id_ed25519
ansible_ssh_common_args='-o StrictHostKeyChecking=no'
