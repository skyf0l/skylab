---
# Template for host-specific ansible secrets.
#
# Copy to `secrets.local.yml` (gitignored) and fill in real values:
#     cp secrets.example.yml secrets.local.yml
# Then pass it on every run (extra-vars, highest precedence):
#     ansible-playbook -i inventories/skylab/hosts.local.ini \
#       -e @inventories/skylab/secrets.local.yml playbooks/skylab/start.yml
#
# DO NOT commit secrets.local.yml — this GitHub repo is public.

# RKE2 cluster join token. Generate once and keep it STABLE (needed to add more
# nodes later, e.g. the Pi):  openssl rand -hex 32
rke2_token: "REPLACE_ME"

# Cloudflare R2 credentials for the Terraform state backend (vault/terraform).
# Used at bootstrap to apply the Vault Terraform in-cluster — the creds can't come
# from Vault yet (Vault is configured BY that Terraform). Create an R2 API token
# with Object Read & Write on the `tfstates` bucket.
r2_access_key_id: "REPLACE_ME"
r2_secret_access_key: "REPLACE_ME"

# NOTE: no Cloudflare DNS token here any more. cert-manager's DNS-01 credential
# is minted by Vault's cloudflare secrets engine (role dns-edit, account-wide)
# and leased by ESO — see k8s/projects/security-stack/cert-manager-issuers.
# Consequence for a FRESH cluster: certificates only start issuing once Vault is
# up and its cloudflare engine has been seeded (vault/README.md "Cloudflare
# engine"), instead of from the first minute of bootstrap.
# (optional) Authelia users database — your real login(s) with argon2id hashes.
# Seeded straight into Vault at bootstrap so the hash never lands in the public
# repo. If unset, a disabled placeholder is used (fill in later via the Vault UI).
# Generate a hash:
#   docker run --rm authelia/authelia:4.39.20 \
#     authelia crypto hash generate argon2 --password 'your-password'
# authelia_users_yaml: |
#   users:
#     you:
#       displayname: 'You'
#       password: '$argon2id$v=19$m=65536,t=3,p=4$....$....'
#       email: you@example.com
#       groups: [admins]

# Add other host-level secrets here as the setup grows, e.g.:
# rke2_agent_token: "REPLACE_ME"
