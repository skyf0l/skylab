# ---------------------------------------------------------------------------
# AppProjects — least-privilege boundaries for the whole app-of-apps tree.
# Defined here in the hand-applied bootstrap so they exist BEFORE any
# ApplicationSet generates an Application that references them (no
# chicken-and-egg). They are NOT auto-synced — re-run ./sync.sh after editing.
# Three tiers, by blast radius:
#   platform      privileged foundation (cluster/gitops/security stacks) + the
#                 GitOps management plane (the app-of-apps roots and every
#                 *-stack ApplicationSet, which create Applications — a
#                 privileged op kept out of the lower tiers to block
#                 project escalation).
#   observability metrics/logs/cost — namespaced, plus the few cluster-scoped
#                 objects their operators ship (CRDs, admission webhooks,
#                 cluster roles).
#   workloads     user-facing apps — namespaced only, NO cluster-scoped
#                 resources at all.
# All three are pinned to this cluster and the two skylab repos (never "*"),
# unlike the stock `default` project this replaces.
# ---------------------------------------------------------------------------
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: platform
  namespace: argocd
spec:
  description: Privileged foundation + app-of-apps management plane
  sourceRepos:
    - https://github.com/skyf0l/skylab.git
    - https://github.com/skyf0l/skylab-private.git
  destinations:
    # Privileged tier legitimately spans every namespace (kube-system, argocd,
    # cert-manager, vault, ...) and creates them via CreateNamespace.
    - server: https://kubernetes.default.svc
      namespace: "*"
  clusterResourceWhitelist:
    - group: "*"
      kind: "*"
  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"
---
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: observability
  namespace: argocd
spec:
  description: Monitoring, logging and finops workloads
  sourceRepos:
    - https://github.com/skyf0l/skylab.git
    - https://github.com/skyf0l/skylab-private.git
  destinations:
    - server: https://kubernetes.default.svc
      namespace: monitoring
    - server: https://kubernetes.default.svc
      namespace: logging
    - server: https://kubernetes.default.svc
      namespace: opencost
    - server: https://kubernetes.default.svc
      namespace: vpa
    - server: https://kubernetes.default.svc
      namespace: goldilocks
    # kube-prometheus-stack creates control-plane scrape Services (kubelet,
    # kube-controller-manager, kube-scheduler, ...) in kube-system.
    - server: https://kubernetes.default.svc
      namespace: kube-system
  # The only cluster-scoped objects these charts ship: kube-prometheus CRDs +
  # admission webhooks, and cluster roles for the prometheus-operator,
  # node-exporter, kube-state-metrics, alloy and opencost. Everything else must
  # be namespaced. Extend if a sync reports "resource not permitted in project".
  clusterResourceWhitelist:
    # Namespace: the vpa/goldilocks apps self-create their namespace (CreateNamespace=true).
    - group: ""
      kind: Namespace
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
    - group: rbac.authorization.k8s.io
      kind: ClusterRole
    - group: rbac.authorization.k8s.io
      kind: ClusterRoleBinding
    - group: admissionregistration.k8s.io
      kind: MutatingWebhookConfiguration
    - group: admissionregistration.k8s.io
      kind: ValidatingWebhookConfiguration
  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"
---
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: workloads
  namespace: argocd
spec:
  description: User-facing app workloads — namespaced only, no cluster-scoped resources
  sourceRepos:
    - https://github.com/skyf0l/skylab.git
    - https://github.com/skyf0l/skylab-private.git
    # garmin-mcp deploys an upstream app straight from its own repo.
    - https://github.com/skyf0l/garmin_mcp.git
  destinations:
    - server: https://kubernetes.default.svc
      namespace: mcp
  # No clusterResourceWhitelist on purpose: app workloads must not create
  # cluster-scoped objects. Add namespaces above as new apps land.
  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"
---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: apps
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - git:
        repoURL: https://github.com/skyf0l/skylab.git
        revision: main
        files:
          - path: clusters/skylab/config.json
  template:
    metadata:
      name: "{{.name}}-apps"
      labels:
        app.kubernetes.io/part-of: app-of-apps
        skylab.dev/tier: platform
    spec:
      project: platform
      source:
        repoURL: "{{.repo.url}}"
        targetRevision: "{{.repo.revision}}"
        path: k8s/apps
        kustomize:
          namePrefix: "{{.name}}-"
          patches:
            - target:
                kind: ApplicationSet
              patch: |-
                - op: replace
                  path: /spec/generators/0/matrix/generators/0/list/elements/0/name
                  value: {{.name}}
                - op: replace
                  path: /spec/generators/0/matrix/generators/1/git/repoURL
                  value: {{.repo.url}}
                - op: replace
                  path: /spec/generators/0/matrix/generators/1/git/revision
                  value: {{.repo.revision}}
      destination:
        server: "https://kubernetes.default.svc"
        namespace: argocd
      syncPolicy:
        automated:
          prune: true
        syncOptions:
          - Validate=true
          - PrunePropagationPolicy=foreground
          - PruneLast=true
          - RespectIgnoreDifferences=true
---
# The cluster's PRIVATE app-of-apps root. Same shape as `apps` above, but the app
# manifests come from the skylab-private repo, per cluster (clusters/<name>/apps), so
# private apps for skylab live only there and never in this public repo. Cluster meta
# (name) still comes from the public config.json. Lives here, alongside the public root,
# because it's bootstrap config you apply by hand — not auto-synced — so it activates on
# your terms (after skylab-private exists + the ArgoCD GitHub App is granted access).
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: private-apps
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - git:
        repoURL: https://github.com/skyf0l/skylab.git
        revision: main
        files:
          - path: clusters/skylab/config.json
  template:
    metadata:
      name: "{{.name}}-private-apps"
      labels:
        app.kubernetes.io/part-of: app-of-apps
        skylab.dev/tier: platform
    spec:
      project: platform
      source:
        repoURL: https://github.com/skyf0l/skylab-private.git
        targetRevision: main
        path: clusters/{{.name}}/apps
        kustomize:
          namePrefix: "{{.name}}-private-"
      destination:
        server: "https://kubernetes.default.svc"
        namespace: argocd
      syncPolicy:
        automated:
          prune: true
        syncOptions:
          - Validate=true
          - PrunePropagationPolicy=foreground
          - PruneLast=true
          - RespectIgnoreDifferences=true
